<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giant Tentacle Demon — WOLFDRAGON</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Oswald:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:       #6600cc;
      --void-dark:  #220044;
      --void-glow:  #aa44ff;
      --black:      #0a0a0a;
      --black-soft: #080e10;
      --white:      #f0f0f0;
      --cream:      #e0e8ec;
      --font-title: 'Metal Mania', cursive;
      --font-body:  'Oswald', sans-serif;
      --font-hand:  'Special Elite', cursive;
    }

    html, body {
      background: var(--black-soft);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV BAR ── */
    .room-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: #060408;
      border-bottom: 2px solid var(--void-dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-home {
      color: var(--void-glow);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .nav-home:hover { opacity: 1; }

    .room-title {
      font-family: var(--font-title);
      font-size: 1.1rem;
      color: var(--void-glow);
      letter-spacing: 0.15em;
      text-shadow: 0 0 12px var(--void);
    }

    .nav-spacer { width: 120px; }

    /* ── MAIN CANVAS AREA ── */
    .room-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      cursor: default;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: auto;
    }

    .hint-bar {
      width: 100%;
      max-width: 1400px;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: #2a1044;
      text-transform: uppercase;
      background: #05040a;
      border-top: 1px solid #110022;
    }

    /* ── FOOTER ── */
    .room-footer {
      background: #05040a;
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #110822;
      border-top: 1px solid #110022;
    }
    .room-footer a {
      color: var(--void);
      text-decoration: none;
    }
    .room-footer a:hover { color: var(--void-glow); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #060408; }
    ::-webkit-scrollbar-thumb { background: var(--void-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--void); }

    /* ── MOBILE TOUCH CONTROLS ── */
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      user-select: none;
    }
    .touch-btn {
      position: absolute;
      pointer-events: all;
      background: rgba(102, 0, 204, 0.35);
      border: 1px solid rgba(170, 68, 255, 0.5);
      color: rgba(170, 68, 255, 0.9);
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    @media (max-width: 700px) {
      #touch-controls { display: block; }
      .room-nav { padding: 0 12px; }
      .room-title { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="room-nav">
    <a class="nav-home" href="/">← Back to World</a>
    <span class="room-title" id="room-title">???</span>
    <div class="nav-spacer"></div>
  </nav>

  <!-- ── CANVAS ── -->
  <main class="room-main">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="touch-controls">
        <div class="touch-btn" id="tc-left"  style="left:2%;bottom:28%;width:11%;height:9%;">◀</div>
        <div class="touch-btn" id="tc-right" style="left:14%;bottom:28%;width:11%;height:9%;">▶</div>
        <div class="touch-btn" id="tc-up"    style="left:8%;bottom:38%;width:11%;height:9%;">▲</div>
        <div class="touch-btn" id="tc-down"  style="left:8%;bottom:18%;width:11%;height:9%;">▼</div>
        <div class="touch-btn" id="tc-z"     style="right:14%;bottom:18%;width:11%;height:9%;">Z</div>
        <div class="touch-btn" id="tc-x"     style="right:2%;bottom:18%;width:11%;height:9%;">X</div>
        <div class="touch-btn" id="tc-c"     style="right:8%;bottom:28%;width:11%;height:9%;">C</div>
      </div>
    </div>
    <div class="hint-bar">Z: Attack &nbsp;·&nbsp; X: Spell &nbsp;·&nbsp; C: Block &nbsp;·&nbsp; ↑↓: Row &nbsp;·&nbsp; ←→: Move</div>
  </main>

  <footer class="room-footer">
    <a href="/">← Return to World</a> &nbsp;·&nbsp; WOLFDRAGON &nbsp;·&nbsp;
    <span style="color:#0d0818">All characters fictional</span>
  </footer>

<script>
(function () {
'use strict';

// ── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const W = 800, H = 480;
canvas.width  = W;
canvas.height = H;

// ── LAYOUT CONSTANTS ────────────────────────────────────────────────────────
const WD_W = 88, WD_H = 88;
const WD_SRC = { sx: 82, sy: 144, sw: 858, sh: 722 };

const PLAT_X = 0, PLAT_Y = 212, PLAT_DW = 800, PLAT_DH = 339;

const BOSS_DX = -10, BOSS_DW = 820, BOSS_DH = 348;
const BOSS_REST_Y   =   5;
const BOSS_RISEN_Y  = -60;
const BOSS_INTRO_Y  = 640;

function eyePos(bossY)     { return { x: 400, y: bossY + 142 }; }
function mouthPos(bossY)   { return { x: 400, y: bossY + 200 }; }
function stomachPos(bossY) { return { x: 350 + Math.random()*100, y: bossY + 222 }; }

const ROW_FEET  = [435, 345];
const ROW_MIN_X = 30, ROW_MAX_X = 762;

const SMASH_CX = [0, 96, 240, 384, 528, 672];
const SMASH_W  = 140;

function getKeyCount() {
  const k = JSON.parse(localStorage.getItem('wolfdragon_keys') || '{}');
  return Object.values(k).filter(Boolean).length;
}

// ── GAME STATE ───────────────────────────────────────────────────────────────
let gamePhase = 'loading';
let introT = 0;
let frame  = 0;
let shakeMag = 0;
let msgText = '', msgT = 0;

// ── PLAYER ───────────────────────────────────────────────────────────────────
const PL = {
  row: 0, x: 120, facing: 1,
  hp: 140, maxHp: 140,
  shHp: 3, shMaxHp: 3,
  shBroken: false,
  atkTimer: 0, atkDur: 14, atkCd: 0,
  iframes: 0, dmgFlashT: 0,
  knockVx: 0,
  spells: 3, maxSpells: 3,
  get sh() { return K['KeyC'] && !this.shBroken && this.atkTimer <= 0; },
};

// ── BOSS ─────────────────────────────────────────────────────────────────────
const BOSS = {
  hp: 2800, maxHp: 2800,
  y: BOSS_INTRO_Y,
  flashT: 0,
  revealed: false,
  risen: false,
};

// ── ATTACK TIMING ────────────────────────────────────────────────────────────
const T = {
  smash_warn:    70, smash_active:  20, smash_rocks: 90, smash_recover: 20,
  laser_warn:    55, laser_active: 110, laser_recover: 25,
  sweep_warn:    65, sweep_active:  50, sweep_recover: 25,
  spray_warn:    45, spray_recover: 30,
  idle_base:    110,
  stomdemon_rise: 80, stomdemon_fire: 300, stomdemon_settle: 80,
  megasmash_total: 650,
  duallaser_rise: 80, duallaser_charge: 80, duallaser_beam: 120, duallaser_settle: 80,
};

// ── ATTACK SEQUENCES ─────────────────────────────────────────────────────────
let idleT = 0;

const CUR = {
  type:   null,
  phase:  null,
  t:      0,
  zone: 0, rocksLeft: 0, nextRockT: 0,
  laserX: 0, laserDir: 1, laserDmgCd: 0,
  sweepRow: 0, sweepX: 0, sweepDir: 1, sweepDmgCd: 0,
  sprayCount: 0, sprayFired: 0, sprayNextT: 0,
  risenTarget: BOSS_RISEN_Y,
  // megasmash sub-state
  megaSubZone: 1, megaSubPhase: 'warn', megaSubT: 0, megaRainT: 0,
  // duallaser sub-state
  dualLaserLX: 400, dualLaserRX: 400, dualPhase: 'rise', dualT: 0,
  // stomdemon sub-state
  stomFireCount: 0, stomNextT: 0,
};

let seqIdx  = 0;
let cycleN  = 0;
let p2Done  = 0;

const SEQUENCE = [
  { type:'smash',  zone:3, rocks:3 },
  { type:'laser',  dir:1 },
  { type:'sweep',  row:0 },
  { type:'spray',  count:3 },
  { type:'smash',  zone:1, rocks:2 },
  { type:'smash',  zone:5, rocks:2 },
  { type:'sweep',  row:1 },
  { type:'laser',  dir:-1 },
  { type:'spray',  count:4 },
  { type:'smash',  zone:2, rocks:3 },
  { type:'smash',  zone:4, rocks:2 },
  { type:'spray',  count:3 },
];
const P2_SEQ = ['stomdemon','megasmash','duallaser'];

// ── ENTITY LISTS ─────────────────────────────────────────────────────────────
let fireballs  = [];
let rocks      = [];
let spellProjs = [];
let particles  = [];
let drops      = [];
let smashWarnT = 0, smashWarnZ = 0;
let laserWarnT = 0;
let sweepWarnT = 0, sweepWarnRow = 0;
let megaRockT  = 0;

// Stars pre-generated
const STARS = [];
for (let i = 0; i < 80; i++) {
  STARS.push({ x: Math.random()*W, y: Math.random()*200, r: 0.5+Math.random()*1.2, blink: Math.random()<0.125 });
}

// ── BACKGROUND REMOVAL ───────────────────────────────────────────────────────
function removeBg(img) {
  const oc = document.createElement('canvas');
  oc.width = img.naturalWidth; oc.height = img.naturalHeight;
  const ox = oc.getContext('2d');
  ox.drawImage(img, 0, 0);
  const id = ox.getImageData(0, 0, oc.width, oc.height);
  const d = id.data, W2 = oc.width, H2 = oc.height;
  const vis = new Uint8Array(W2*H2), q = new Int32Array(W2*H2);
  let head=0, tail=0;
  function enq(x,y){ if(x<0||x>=W2||y<0||y>=H2) return; const i=y*W2+x; if(vis[i]) return; vis[i]=1; q[tail++]=i; }
  for(let x=0;x<W2;x++){ enq(x,0); enq(x,H2-1); }
  for(let y=0;y<H2;y++){ enq(0,y); enq(W2-1,y); }
  while(head<tail){
    const idx=q[head++], pi=idx*4;
    if(d[pi+3]===0||(d[pi]>210&&d[pi+1]>210&&d[pi+2]>210)){ d[pi+3]=0; const x=idx%W2,y=(idx/W2)|0; enq(x-1,y);enq(x+1,y);enq(x,y-1);enq(x,y+1); }
  }
  ox.putImageData(id,0,0); return oc;
}

// ── IMAGE SHEETS ─────────────────────────────────────────────────────────────
let demonSheet = null;
let platSheet  = null;
let wdSheet    = null;

// ── SFX ──────────────────────────────────────────────────────────────────────
const SFX = (function(){
  const ac = new(window.AudioContext||window.webkitAudioContext)();
  window.addEventListener('keydown',()=>{ if(ac.state==='suspended') ac.resume(); },{passive:true});
  canvas.addEventListener('click',()=>{ if(ac.state==='suspended') ac.resume(); },{passive:true});
  const mast=ac.createGain(); mast.gain.value=0.45; mast.connect(ac.destination);
  function osc(freq,type,dur,vol,freqEnd){
    try{const g=ac.createGain();g.gain.setValueAtTime(Math.min(vol,1),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);const o=ac.createOscillator();o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime);if(freqEnd)o.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,10),ac.currentTime+dur);o.connect(g);g.connect(mast);o.start();o.stop(ac.currentTime+dur);}catch(e){}
  }
  function noise(dur,vol,bpF,bpQ){
    try{const len=Math.ceil(ac.sampleRate*Math.min(dur,2));const buf=ac.createBuffer(1,len,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=bpF;f.Q.value=bpQ||1;const g=ac.createGain();g.gain.setValueAtTime(Math.min(vol,1),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);src.connect(f);f.connect(g);g.connect(mast);src.start();src.stop(ac.currentTime+dur);}catch(e){}
  }
  return {
    tentacleSmash(){ osc(45,'sawtooth',0.4,1.0,20); noise(0.3,0.8,200,0.4); },
    rockImpact()   { noise(0.2,0.6,450,0.8); osc(80,'sawtooth',0.15,0.5,30); },
    laserCharge()  { osc(800,'sine',0.6,0.3,2400); },
    laserBeam()    { noise(0.18,0.5,3500,2); osc(600,'square',0.12,0.25,800); },
    sweep()        { noise(0.4,0.6,700,0.5); osc(120,'sawtooth',0.3,0.5,40); },
    fireball()     { osc(280,'sawtooth',0.18,0.35,80); noise(0.1,0.3,1200,1); },
    playerHurt()   { osc(160,'sawtooth',0.25,0.7,55); noise(0.12,0.4,450,1); },
    playerAttack() { noise(0.12,0.5,4500,0.35); osc(900,'sawtooth',0.08,0.4,120); },
    playerSpell()  { osc(240,'sawtooth',0.22,0.4,900); noise(0.18,0.25,1600,1.2); },
    bossHurt()     { noise(0.1,0.35,900,1.2); osc(180,'sawtooth',0.08,0.25,60); },
    bossRise()     { osc(38,'sawtooth',0.6,0.9,18); noise(0.5,0.7,200,0.3); },
    waveImpact()   { osc(55,'sine',0.3,0.8,30); noise(0.6,0.6,180,0.4); },
    victory()      { for(let i=0;i<5;i++) setTimeout(()=>osc(440+i*110,'sine',0.3,0.3),i*120); },
    shield()       { osc(420,'square',0.08,0.5,900); osc(210,'square',0.1,0.4,420); },
  };
})();

// ── INPUT ────────────────────────────────────────────────────────────────────
const K={},J={};
window._WD_K=K; window._WD_J=J;
window.addEventListener('keydown',e=>{ if(!K[e.code])J[e.code]=true; K[e.code]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault(); });
window.addEventListener('keyup',e=>{ K[e.code]=false; });
function eat(c){ if(J[c]){J[c]=false;return true;} return false; }

// Touch controls
(function setupTouch(){
  const map = {
    'tc-left':  'ArrowLeft',
    'tc-right': 'ArrowRight',
    'tc-up':    'ArrowUp',
    'tc-down':  'ArrowDown',
    'tc-z':     'KeyZ',
    'tc-x':     'KeyX',
    'tc-c':     'KeyC',
  };
  Object.entries(map).forEach(([id, code]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      if(!K[code]) J[code]=true;
      K[code]=true;
      if(ac && ac.state==='suspended') ac.resume();
    }, {passive:false});
    el.addEventListener('touchend', e => {
      e.preventDefault();
      K[code]=false;
    }, {passive:false});
  });
  // expose ac reference for touch resume
  var ac = SFX._ac || null;
})();

// ── PARTICLE HELPER ──────────────────────────────────────────────────────────
function burst(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=(0.3+Math.random()*0.7)*spd;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:18+Math.random()*22,maxLife:40,col,sz:2+Math.random()*3});
  }
}

// ── DROP TRACKING ────────────────────────────────────────────────────────────
let hpDropsDone = [false, false];

function checkBossHpDrops() {
  if (!hpDropsDone[0] && BOSS.hp < BOSS.maxHp*0.75) {
    hpDropsDone[0]=true;
    drops.push({ x: W/2-60, y: ROW_FEET[1]-15, type:'hp' });
  }
  if (!hpDropsDone[1] && BOSS.hp < BOSS.maxHp*0.25) {
    hpDropsDone[1]=true;
    drops.push({ x: W/2+60, y: ROW_FEET[1]-15, type:'hp' });
  }
}
function collectDrop(d) {
  d.collected = true;
  if (d.type === 'hp') {
    PL.hp = Math.min(PL.maxHp, PL.hp + 40);
    burst(d.x, d.y, '#00ee88', 14, 5);
    msgText='+ 40 HP'; msgT=90;
  }
}

// ── HURT / VICTORY / DEATH ───────────────────────────────────────────────────
function hurtPlayer(dmg, knockVx) {
  if (PL.iframes > 0) return;
  if (PL.sh && PL.shHp > 0) {
    PL.shHp--;
    SFX.shield();
    if (PL.shHp <= 0) { PL.shBroken = true; }
    if (knockVx) PL.knockVx = knockVx * 0.4;
    burst(PL.x+WD_W/2, ROW_FEET[PL.row]-WD_H/2, '#4499ff', 10, 4);
    return;
  }
  PL.hp -= dmg;
  PL.hp = Math.max(0, PL.hp);
  PL.iframes = 45;
  PL.dmgFlashT = 12;
  if (knockVx) PL.knockVx = knockVx;
  SFX.playerHurt();
  shakeMag = 4;
  burst(PL.x+WD_W/2, ROW_FEET[PL.row]-WD_H/2, '#ff4422', 12, 4);
  if (PL.hp <= 0) {
    gamePhase = 'dead';
  }
}

function doVictory() {
  if (gamePhase === 'victory') return;
  gamePhase = 'victory';
  const saved = JSON.parse(localStorage.getItem('wolfdragon_keys') || '{}');
  saved.demonKey = true;
  localStorage.setItem('wolfdragon_keys', JSON.stringify(saved));
  SFX.victory();
  burst(W/2, H/2, '#aa44ff', 60, 12);
  shakeMag = 8;
}

// ── ATTACK SYSTEM ────────────────────────────────────────────────────────────
function startNextAttack() {
  if (BOSS.hp < BOSS.maxHp*0.5 && p2Done < P2_SEQ.length && seqIdx === 0 && cycleN > 0) {
    const p2type = P2_SEQ[p2Done];
    p2Done++;
    launchAttack({ type: p2type });
    return;
  }
  const def = SEQUENCE[seqIdx];
  seqIdx = (seqIdx+1) % SEQUENCE.length;
  if (seqIdx === 0) cycleN++;
  launchAttack(def);
}

function launchAttack(def) {
  CUR.type = def.type;
  CUR.phase = 'warn';
  switch (def.type) {
    case 'smash':
      CUR.zone = def.zone;
      CUR.t = T.smash_warn;
      CUR.rocksLeft = def.rocks || 2;
      CUR.nextRockT = 0;
      smashWarnT = T.smash_warn; smashWarnZ = def.zone;
      break;
    case 'laser':
      CUR.laserDir = def.dir;
      CUR.laserX = def.dir === 1 ? 0 : W;
      CUR.t = T.laser_warn;
      CUR.laserDmgCd = 0;
      laserWarnT = T.laser_warn;
      break;
    case 'sweep':
      CUR.sweepRow = def.row;
      CUR.sweepDir = 1;
      CUR.sweepX = -80;
      CUR.t = T.sweep_warn;
      CUR.sweepDmgCd = 0;
      sweepWarnT = T.sweep_warn; sweepWarnRow = def.row;
      break;
    case 'spray':
      CUR.sprayCount = def.count; CUR.sprayFired = 0;
      CUR.t = T.spray_warn;
      CUR.sprayNextT = 0;
      break;
    case 'stomdemon':
      BOSS.risen = true;
      CUR.phase = 'rise';
      CUR.t = T.stomdemon_rise;
      CUR.stomFireCount = 0;
      CUR.stomNextT = 0;
      break;
    case 'megasmash':
      CUR.megaSubZone = 1;
      CUR.megaSubPhase = 'warn';
      CUR.megaSubT = 45;
      CUR.megaRainT = 0;
      CUR.t = T.megasmash_total;
      CUR.phase = 'active';
      smashWarnT = 45; smashWarnZ = 1;
      break;
    case 'duallaser':
      BOSS.risen = true;
      CUR.dualPhase = 'rise';
      CUR.dualT = T.duallaser_rise;
      CUR.dualLaserLX = 400;
      CUR.dualLaserRX = 400;
      CUR.t = T.duallaser_rise + T.duallaser_charge + T.duallaser_beam + T.duallaser_settle;
      CUR.phase = 'active';
      break;
  }
}

function spawnRock(cx, row) {
  const lx = cx + (Math.random()-0.5) * SMASH_W * 0.6;
  const startX = cx + (Math.random()-0.5)*30;
  const startY = BOSS.y + 80 + Math.random()*40;
  const landY = ROW_FEET[row !== undefined ? row : (Math.random()<0.5 ? 0 : 1)];
  const tFall = 30 + Math.random()*20;
  const vy = (landY - startY) / tFall;
  rocks.push({ x: startX, y: startY, vx: (lx-startX)/tFall, vy, landX: lx, landY, dmg:15, landed:false });
}

function spawnRockFromTop(cx) {
  const startX = cx + (Math.random()-0.5)*60;
  const landX  = cx + (Math.random()-0.5)*60;
  const landY  = ROW_FEET[Math.random()<0.5 ? 0 : 1];
  const startY = -20;
  const tFall  = 40 + Math.random()*20;
  const vy     = (landY - startY) / tFall;
  rocks.push({ x: startX, y: startY, vx: (landX-startX)/tFall, vy, landX, landY, dmg:15, landed:false });
}

function tickAttack() {
  CUR.t--;

  // Countdown warning indicators
  if (smashWarnT > 0) smashWarnT--;
  if (laserWarnT > 0) laserWarnT--;
  if (sweepWarnT > 0) sweepWarnT--;

  switch (CUR.type) {

    // ─ SMASH ─────────────────────────────────────────────────────────────────
    case 'smash': {
      if (CUR.phase === 'warn') {
        if (CUR.t <= 0) {
          CUR.phase = 'active';
          CUR.t = T.smash_active;
          SFX.tentacleSmash();
          shakeMag = 5;
          // Instant damage in zone
          const zx = SMASH_CX[CUR.zone];
          if (PL.iframes <= 0) {
            const dist = Math.abs((PL.x+WD_W/2) - zx);
            if (dist < SMASH_W/2 + 20) hurtPlayer(25, (PL.x+WD_W/2 < zx ? -5 : 5));
          }
          burst(zx, ROW_FEET[1]-10, '#aa2200', 20, 7);
        }
      } else if (CUR.phase === 'active') {
        if (CUR.t <= 0) {
          CUR.phase = 'rocks';
          CUR.t = T.smash_rocks;
          CUR.nextRockT = 0;
        }
      } else if (CUR.phase === 'rocks') {
        CUR.nextRockT--;
        if (CUR.nextRockT <= 0 && CUR.rocksLeft > 0) {
          spawnRock(SMASH_CX[CUR.zone], 0);
          spawnRock(SMASH_CX[CUR.zone], 1);
          CUR.rocksLeft--;
          CUR.nextRockT = 22;
          SFX.rockImpact();
        }
        if (CUR.t <= 0) {
          CUR.phase = 'recover';
          CUR.t = T.smash_recover;
        }
      } else if (CUR.phase === 'recover') {
        if (CUR.t <= 0) { endAttack(); }
      }
      break;
    }

    // ─ LASER ─────────────────────────────────────────────────────────────────
    case 'laser': {
      if (CUR.phase === 'warn') {
        if (CUR.t <= 0) {
          CUR.phase = 'active';
          CUR.t = T.laser_active;
          SFX.laserBeam();
          CUR.laserDmgCd = 0;
        }
      } else if (CUR.phase === 'active') {
        CUR.laserX += (W / T.laser_active) * CUR.laserDir;
        CUR.laserDmgCd--;
        if (CUR.laserDmgCd <= 0) {
          CUR.laserDmgCd = 3;
          const lx = CUR.laserX;
          const px = PL.x + WD_W/2;
          if (Math.abs(px - lx) < 30) hurtPlayer(8, 0);
        }
        if (CUR.t <= 0) {
          CUR.phase = 'recover';
          CUR.t = T.laser_recover;
        }
      } else if (CUR.phase === 'recover') {
        if (CUR.t <= 0) { endAttack(); }
      }
      break;
    }

    // ─ SWEEP ─────────────────────────────────────────────────────────────────
    case 'sweep': {
      if (CUR.phase === 'warn') {
        if (CUR.t <= 0) {
          CUR.phase = 'active';
          CUR.t = T.sweep_active;
          CUR.sweepX = -80;
          CUR.sweepDmgCd = 0;
          SFX.sweep();
        }
      } else if (CUR.phase === 'active') {
        CUR.sweepX += (960 / T.sweep_active);
        CUR.sweepDmgCd--;
        if (CUR.sweepDmgCd <= 0 && PL.row === CUR.sweepRow) {
          const px = PL.x + WD_W/2;
          if (Math.abs(px - CUR.sweepX) < 65) {
            hurtPlayer(30, CUR.sweepDir * 8);
            CUR.sweepDmgCd = 20;
          }
        }
        if (CUR.t <= 0) {
          CUR.phase = 'recover';
          CUR.t = T.sweep_recover;
        }
      } else if (CUR.phase === 'recover') {
        if (CUR.t <= 0) { endAttack(); }
      }
      break;
    }

    // ─ SPRAY ─────────────────────────────────────────────────────────────────
    case 'spray': {
      if (CUR.phase === 'warn') {
        if (CUR.t <= 0) {
          CUR.phase = 'active';
          CUR.t = (CUR.sprayCount + 1) * 12 + T.spray_recover;
          CUR.sprayNextT = 0;
        }
      } else if (CUR.phase === 'active') {
        CUR.sprayNextT--;
        if (CUR.sprayNextT <= 0 && CUR.sprayFired < CUR.sprayCount) {
          const mp = mouthPos(BOSS.y);
          const tx = PL.x + WD_W/2;
          const ty = ROW_FEET[PL.row] - WD_H/2;
          const spread = (Math.random()-0.5) * (20 * Math.PI/180);
          const angle  = Math.atan2(ty - mp.y, tx - mp.x) + spread;
          const speed  = 4.5;
          fireballs.push({ x: mp.x, y: mp.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, dmg:12, fromStomach:false });
          CUR.sprayFired++;
          CUR.sprayNextT = 12;
          SFX.fireball();
        }
        if (CUR.t <= 0) { endAttack(); }
      }
      break;
    }

    // ─ STOMDEMON ─────────────────────────────────────────────────────────────
    case 'stomdemon': {
      if (CUR.phase === 'rise') {
        if (CUR.t <= 0) { CUR.phase = 'fire'; CUR.t = T.stomdemon_fire; CUR.stomFireCount = 0; CUR.stomNextT = 0; }
      } else if (CUR.phase === 'fire') {
        CUR.stomNextT--;
        if (CUR.stomNextT <= 0 && CUR.stomFireCount < 15) {
          const sp = stomachPos(BOSS.y);
          // Aim at different x zones across platform
          const targetX = 60 + Math.random() * (W - 120);
          const targetY = ROW_FEET[Math.random()<0.5 ? 0 : 1] - WD_H/2;
          const speed   = 3.5;
          const angle   = Math.atan2(targetY - sp.y, targetX - sp.x);
          fireballs.push({ x: sp.x, y: sp.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, dmg:18, fromStomach:true });
          CUR.stomFireCount++;
          CUR.stomNextT = 20;
          SFX.fireball();
        }
        if (CUR.t <= 0) { CUR.phase = 'settle'; CUR.t = T.stomdemon_settle; BOSS.risen = false; }
      } else if (CUR.phase === 'settle') {
        if (CUR.t <= 0) { endAttack(); }
      }
      break;
    }

    // ─ MEGASMASH ─────────────────────────────────────────────────────────────
    case 'megasmash': {
      // Continuous rock rain
      CUR.megaRainT--;
      if (CUR.megaRainT <= 0) {
        spawnRockFromTop(Math.random() * W);
        CUR.megaRainT = 15;
      }

      // Rapid sub-smashes
      CUR.megaSubT--;
      if (CUR.megaSubPhase === 'warn') {
        if (CUR.megaSubT <= 0) {
          CUR.megaSubPhase = 'active';
          CUR.megaSubT = 15;
          SFX.tentacleSmash();
          shakeMag = 4;
          const zx = SMASH_CX[CUR.megaSubZone];
          if (PL.iframes <= 0) {
            const dist = Math.abs((PL.x+WD_W/2) - zx);
            if (dist < SMASH_W/2 + 20) hurtPlayer(20, (PL.x+WD_W/2 < zx ? -5 : 5));
          }
          burst(zx, ROW_FEET[1]-10, '#cc3300', 16, 6);
        }
      } else if (CUR.megaSubPhase === 'active') {
        if (CUR.megaSubT <= 0) {
          CUR.megaSubZone++;
          if (CUR.megaSubZone <= 5) {
            CUR.megaSubPhase = 'warn';
            CUR.megaSubT = 45;
            smashWarnT = 45; smashWarnZ = CUR.megaSubZone;
          } else {
            CUR.megaSubPhase = 'done';
          }
        }
      }

      if (CUR.t <= 0) { endAttack(); }
      break;
    }

    // ─ DUALLASER ─────────────────────────────────────────────────────────────
    case 'duallaser': {
      CUR.dualT--;
      if (CUR.dualPhase === 'rise') {
        if (CUR.dualT <= 0) {
          CUR.dualPhase = 'charge';
          CUR.dualT = T.duallaser_charge;
          laserWarnT = T.duallaser_charge;
          SFX.laserCharge();
        }
      } else if (CUR.dualPhase === 'charge') {
        if (CUR.dualT <= 0) {
          CUR.dualPhase = 'beam';
          CUR.dualT = T.duallaser_beam;
          CUR.dualLaserLX = 400;
          CUR.dualLaserRX = 400;
          SFX.laserBeam();
        }
      } else if (CUR.dualPhase === 'beam') {
        const speed = 400 / T.duallaser_beam;
        CUR.dualLaserLX -= speed;
        CUR.dualLaserRX += speed;
        CUR.dualLaserLX = Math.max(0, CUR.dualLaserLX);
        CUR.dualLaserRX = Math.min(W, CUR.dualLaserRX);

        // Damage check both beams
        if (PL.iframes <= 0) {
          const px = PL.x + WD_W/2;
          const inLeft  = Math.abs(px - CUR.dualLaserLX) < 30;
          const inRight = Math.abs(px - CUR.dualLaserRX) < 30;
          if (inLeft || inRight) {
            if (PL.shMaxHp < 5) {
              hurtPlayer(25, 0);
            } else {
              hurtPlayer(8, 0);
            }
          }
        }
        if (CUR.dualT <= 0) {
          CUR.dualPhase = 'settle';
          CUR.dualT = T.duallaser_settle;
          BOSS.risen = false;
        }
      } else if (CUR.dualPhase === 'settle') {
        if (CUR.dualT <= 0) {
          CUR.t = 0;
          endAttack();
        }
      }
      if (CUR.t <= 0 && CUR.dualPhase !== 'settle') { endAttack(); }
      break;
    }
  }
}

function endAttack() {
  CUR.type  = null;
  CUR.phase = null;
  BOSS.risen = false;
  idleT = 90 + Math.floor(Math.random()*40);
}

// ── DRAW BACKGROUND ──────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 215);
  skyGrad.addColorStop(0, '#01020a');
  skyGrad.addColorStop(1, '#070d1a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 215);

  // Stars
  for (let i = 0; i < STARS.length; i++) {
    const s = STARS[i];
    let alpha = 0.7;
    if (s.blink) alpha = 0.4 + 0.3 * Math.sin(frame * 0.03 + i);
    ctx.fillStyle = `rgba(220,230,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  // Moon
  const moonGrad = ctx.createRadialGradient(678,62,0, 678,62,44);
  moonGrad.addColorStop(0,   '#e8ecf4');
  moonGrad.addColorStop(0.7, '#c0cce0');
  moonGrad.addColorStop(1,   'rgba(192,204,224,0)');
  ctx.fillStyle = moonGrad;
  ctx.beginPath(); ctx.arc(678,62,44,0,Math.PI*2); ctx.fill();

  // Moon halo
  const halo = ctx.createRadialGradient(678,62,30, 678,62,70);
  halo.addColorStop(0, 'rgba(200,220,255,0.08)');
  halo.addColorStop(1, 'rgba(200,220,255,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(678,62,70,0,Math.PI*2); ctx.fill();

  // Moon reflection on water
  for (let i=0; i<4; i++) {
    ctx.fillStyle = `rgba(200,220,255,${0.04-i*0.008})`;
    ctx.fillRect(620, 212+i*3, 120, 2);
  }

  // City silhouette
  ctx.fillStyle = '#080c14';
  const buildings = [
    [0,145,30,215],[30,155,18,215],[48,148,22,215],[70,160,16,215],
    [86,140,20,215],[106,150,24,215],[130,145,18,215],[148,158,14,215],
    [162,142,20,215],[182,152,16,215],[198,147,14,215],
  ];
  buildings.forEach(([bx,by,bw,bh]) => {
    ctx.fillRect(bx, by, bw, bh-by);
  });

  // City windows
  ctx.fillStyle = 'rgba(200,220,140,0.4)';
  const wins = [
    [4,150],[8,162],[14,155],[20,168],[34,158],[38,150],
    [52,152],[56,165],[72,163],[76,155],[90,145],[96,158],
    [110,152],[116,163],[134,148],[140,160],[152,163],[168,145],[174,158],
    [186,155],[200,150],
  ];
  wins.forEach(([wx,wy]) => { if(wy>130&&wy<212) ctx.fillRect(wx,wy,3,3); });

  // Water body
  const waterGrad = ctx.createLinearGradient(0,210,0,348);
  waterGrad.addColorStop(0, '#071020');
  waterGrad.addColorStop(1, '#040c18');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, 210, W, 138);

  // Water surface waves
  let waveAmp = 2;
  if (gamePhase === 'intro') {
    if (introT >= 90 && introT < 150)  waveAmp = 6 + (introT-90)/10;
    else if (introT >= 150 && introT < 240) waveAmp = 8;
    else if (introT >= 240 && introT < 300) waveAmp = 12 + (introT-240)/8;
    else if (introT >= 300)            waveAmp = 10;
  }
  ctx.beginPath();
  ctx.moveTo(0, 210);
  for (let x=0; x<=W; x+=4) {
    ctx.lineTo(x, 210 + Math.sin(x*0.03 + frame*0.06)*waveAmp);
  }
  ctx.lineTo(W, 215); ctx.lineTo(0, 215); ctx.closePath();
  ctx.fillStyle = 'rgba(10,30,80,0.35)';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, 211);
  for (let x=0; x<=W; x+=4) {
    ctx.lineTo(x, 211 + Math.sin(x*0.04 + frame*0.04 + 1.5)*waveAmp*0.7);
  }
  ctx.lineTo(W,216); ctx.lineTo(0,216); ctx.closePath();
  ctx.fillStyle = 'rgba(15,40,90,0.25)';
  ctx.fill();

  // Horizon fog
  ctx.fillStyle = 'rgba(10,30,60,0.3)';
  ctx.fillRect(0, 205, W, 10);
}

// ── DRAW BOSS ────────────────────────────────────────────────────────────────
function drawBoss() {
  if (!demonSheet) return;
  ctx.save();
  ctx.drawImage(demonSheet, BOSS_DX, BOSS.y, BOSS_DW, BOSS_DH);
  if (BOSS.flashT > 0) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(BOSS_DX, BOSS.y, BOSS_DW, BOSS_DH);
  }
  ctx.restore();
}

// ── DRAW PLATFORM ────────────────────────────────────────────────────────────
function drawPlatform() {
  if (!platSheet) return;
  ctx.drawImage(platSheet, PLAT_X, PLAT_Y, PLAT_DW, PLAT_DH);
}

// ── DRAW WOLFDRAGON ──────────────────────────────────────────────────────────
function drawWolfDragon(x, row, facing, atk) {
  if (!wdSheet) return;
  const dy = ROW_FEET[row] - WD_H;

  ctx.save();

  // Damage flash red tint
  if (PL.dmgFlashT > 0 && Math.floor(frame/3)%2===0) {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ff0000';
  }

  // iframes blink
  if (PL.iframes > 0 && Math.floor(frame/4)%2===1 && PL.dmgFlashT <= 0) {
    ctx.globalAlpha = 0.4;
  }

  if (facing === 1) {
    // Sprite faces LEFT, flip for RIGHT
    ctx.translate(x + WD_W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(wdSheet, WD_SRC.sx, WD_SRC.sy, WD_SRC.sw, WD_SRC.sh, 0, dy, WD_W, WD_H);
  } else {
    ctx.drawImage(wdSheet, WD_SRC.sx, WD_SRC.sy, WD_SRC.sw, WD_SRC.sh, x, dy, WD_W, WD_H);
  }
  ctx.restore();

  // Attack arc
  if (atk) {
    const arcX = facing === 1 ? x + WD_W + 8 : x - 8;
    ctx.save();
    ctx.strokeStyle = 'rgba(170,68,255,0.8)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(arcX, dy + WD_H*0.45, 30, -Math.PI*0.6, Math.PI*0.6, facing === -1);
    ctx.stroke();
    ctx.restore();
  }

  // Shield glow
  if (PL.sh) {
    const shX = facing === 1 ? x + WD_W/2 + 10 : x + WD_W/2 - 10;
    const sg = ctx.createRadialGradient(shX, dy+WD_H/2, 5, shX, dy+WD_H/2, 30);
    sg.addColorStop(0, 'rgba(68,153,255,0.5)');
    sg.addColorStop(1, 'rgba(68,153,255,0)');
    ctx.save();
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(shX, dy+WD_H/2, 30, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── DRAW ATTACK EFFECTS ──────────────────────────────────────────────────────
function drawAttackEffects() {
  // Smash warning zone
  if (smashWarnT > 0) {
    const zx = SMASH_CX[smashWarnZ];
    const alpha = 0.2 + 0.5*(1 - smashWarnT/T.smash_warn) + 0.15*Math.sin(frame*0.3);
    for (let r=0; r<2; r++) {
      const fy = ROW_FEET[r];
      ctx.save();
      ctx.globalAlpha = Math.min(1, alpha);
      const warnGrad = ctx.createRadialGradient(zx, fy-10, 5, zx, fy-10, SMASH_W/2);
      warnGrad.addColorStop(0, 'rgba(255,80,0,0.8)');
      warnGrad.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = warnGrad;
      ctx.beginPath();
      ctx.ellipse(zx, fy-10, SMASH_W/2, 20, 0, 0, Math.PI*2);
      ctx.fill();
      // Crack lines
      ctx.strokeStyle = `rgba(255,120,0,${alpha*0.7})`;
      ctx.lineWidth = 1.5;
      for (let c=0; c<5; c++) {
        const ang = c * Math.PI * 0.4 + frame * 0.02;
        ctx.beginPath();
        ctx.moveTo(zx, fy-10);
        ctx.lineTo(zx + Math.cos(ang)*(SMASH_W/2-10), fy-10 + Math.sin(ang)*16);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Active smash tentacle
  if (CUR.type === 'smash' && CUR.phase === 'active') {
    const zx = SMASH_CX[CUR.zone];
    const startY = BOSS.y + 270;
    const endY   = ROW_FEET[1];
    ctx.save();
    ctx.strokeStyle = 'rgba(100,20,20,0.9)';
    ctx.lineWidth = 22;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(zx, startY);
    ctx.bezierCurveTo(
      zx + 30, startY + (endY-startY)*0.33,
      zx - 30, startY + (endY-startY)*0.66,
      zx, endY
    );
    ctx.stroke();
    ctx.strokeStyle = 'rgba(150,30,30,0.5)';
    ctx.lineWidth = 10;
    ctx.stroke();
    // Impact flash oval
    ctx.fillStyle = 'rgba(255,200,100,0.7)';
    ctx.beginPath();
    ctx.ellipse(zx, ROW_FEET[1], 30, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Megasmash active tentacle
  if (CUR.type === 'megasmash' && CUR.megaSubPhase === 'active') {
    const zx = SMASH_CX[CUR.megaSubZone];
    const startY = BOSS.y + 270;
    const endY   = ROW_FEET[1];
    ctx.save();
    ctx.strokeStyle = 'rgba(120,30,0,0.9)';
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(zx, startY);
    ctx.bezierCurveTo(zx+20, startY+(endY-startY)*0.4, zx-20, startY+(endY-startY)*0.7, zx, endY);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,180,50,0.8)';
    ctx.beginPath();
    ctx.ellipse(zx, ROW_FEET[1], 28, 11, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Rocks
  rocks.forEach(r => {
    if (!r.landed) {
      // Shadow growing
      const t = Math.max(0, Math.min(1, (r.y - (-20)) / (r.landY - (-20))));
      ctx.save();
      ctx.globalAlpha = 0.15 + t*0.25;
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.ellipse(r.landX, r.landY, 8+t*14, 4+t*5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      // Rock body
      ctx.save();
      ctx.fillStyle = '#3a3028';
      ctx.beginPath();
      const pts = 6;
      for (let p=0; p<pts; p++) {
        const a = (p/pts)*Math.PI*2;
        const rad = 9 + (Math.sin(a*3+r.x)*4);
        const px = r.x + Math.cos(a)*rad;
        const py = r.y + Math.sin(a)*rad;
        if (p===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else {
      // Settling rock
      ctx.save();
      ctx.globalAlpha = 1 - (r.landedT||0)/20;
      ctx.fillStyle = '#3a3028';
      ctx.beginPath();
      ctx.ellipse(r.landX, r.landY, 10, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  });

  // Laser warning
  if (laserWarnT > 0 && CUR.type === 'laser') {
    const ep = eyePos(BOSS.y);
    const intensity = 1 - laserWarnT/T.laser_warn;
    const eyeGrad = ctx.createRadialGradient(ep.x,ep.y,0, ep.x,ep.y,30+intensity*20);
    eyeGrad.addColorStop(0, `rgba(160,220,255,${0.4+intensity*0.5})`);
    eyeGrad.addColorStop(1, 'rgba(160,220,255,0)');
    ctx.fillStyle = eyeGrad;
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, 30+intensity*20, 0, Math.PI*2);
    ctx.fill();
    // Sparks
    if (frame%3===0) {
      for (let i=0;i<3;i++) {
        particles.push({
          x: ep.x+(Math.random()-0.5)*20,
          y: ep.y+(Math.random()-0.5)*20,
          vx:(Math.random()-0.5)*2, vy:-1-Math.random()*2,
          life:8+Math.random()*8, maxLife:16, col:'#a0dcff', sz:1.5
        });
      }
    }
    if (laserWarnT < 10) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.moveTo(ep.x, ep.y);
      ctx.lineTo(CUR.laserDir===1 ? W : 0, ROW_FEET[0]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Dual laser warning
  if (laserWarnT > 0 && CUR.type === 'duallaser') {
    const ep = eyePos(BOSS.y);
    const intensity = 1 - laserWarnT/(T.duallaser_charge);
    const eyeGrad = ctx.createRadialGradient(ep.x,ep.y,0, ep.x,ep.y,35+intensity*25);
    eyeGrad.addColorStop(0, `rgba(200,160,255,${0.5+intensity*0.4})`);
    eyeGrad.addColorStop(1, 'rgba(200,160,255,0)');
    ctx.fillStyle = eyeGrad;
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, 35+intensity*25, 0, Math.PI*2);
    ctx.fill();
  }

  // Active laser
  if (CUR.type === 'laser' && CUR.phase === 'active') {
    const ep = eyePos(BOSS.y);
    const lx = CUR.laserX;
    ctx.save();
    // Outer glow
    ctx.strokeStyle = 'rgba(100,180,255,0.3)';
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ep.x, ep.y);
    ctx.lineTo(lx, ROW_FEET[0]);
    ctx.stroke();
    // Main beam
    const laserGrad = ctx.createLinearGradient(ep.x,ep.y, lx,ROW_FEET[0]);
    laserGrad.addColorStop(0, 'rgba(160,220,255,0.9)');
    laserGrad.addColorStop(1, 'rgba(200,240,255,0.7)');
    ctx.strokeStyle = laserGrad;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(ep.x, ep.y);
    ctx.lineTo(lx, ROW_FEET[0]);
    ctx.stroke();
    // Core
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ep.x, ep.y);
    ctx.lineTo(lx, ROW_FEET[0]);
    ctx.stroke();
    ctx.restore();
  }

  // Dual laser beams
  if (CUR.type === 'duallaser' && CUR.dualPhase === 'beam') {
    const ep = eyePos(BOSS.y);
    [[CUR.dualLaserLX, '#aa88ff'],[CUR.dualLaserRX, '#cc88ff']].forEach(([lx, col]) => {
      ctx.save();
      ctx.strokeStyle = 'rgba(120,80,255,0.3)';
      ctx.lineWidth = 18;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ep.x, ep.y);
      ctx.lineTo(lx, ROW_FEET[0]);
      ctx.stroke();
      ctx.strokeStyle = col;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(ep.x, ep.y);
      ctx.lineTo(lx, ROW_FEET[0]);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ep.x, ep.y);
      ctx.lineTo(lx, ROW_FEET[0]);
      ctx.stroke();
      ctx.restore();
    });
  }

  // Sweep warning
  if (sweepWarnT > 0) {
    const row = sweepWarnRow;
    const fy  = ROW_FEET[row] - 30;
    const shakeX = Math.sin(frame*0.4)*8*(sweepWarnT/T.sweep_warn);
    ctx.save();
    // Tentacle stub on left side
    ctx.strokeStyle = `rgba(200,120,20,${0.4+0.4*(1-sweepWarnT/T.sweep_warn)})`;
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(shakeX - 20, fy);
    ctx.lineTo(shakeX + 50, fy);
    ctx.stroke();
    // Glow
    const swGlow = ctx.createRadialGradient(shakeX, fy, 5, shakeX, fy, 40);
    swGlow.addColorStop(0, `rgba(255,140,20,${0.3*(1-sweepWarnT/T.sweep_warn)})`);
    swGlow.addColorStop(1, 'rgba(255,140,20,0)');
    ctx.fillStyle = swGlow;
    ctx.beginPath();
    ctx.arc(shakeX, fy, 40, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Active sweep
  if (CUR.type === 'sweep' && CUR.phase === 'active') {
    const row = CUR.sweepRow;
    const fy  = ROW_FEET[row] - 30;
    const sx  = CUR.sweepX;
    const sd  = CUR.sweepDir;
    ctx.save();
    ctx.strokeStyle = 'rgba(120,20,20,0.85)';
    ctx.lineWidth = 22;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx - 60*sd, fy - 10);
    ctx.bezierCurveTo(sx - 20*sd, fy + 15, sx + 20*sd, fy + 15, sx + 60*sd, fy - 10);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(180,40,40,0.4)';
    ctx.lineWidth = 8;
    ctx.stroke();
    ctx.restore();
  }

  // Fireballs
  fireballs.forEach(f => {
    const isStom = f.fromStomach;
    const col1 = isStom ? '#ff8822' : '#8844cc';
    const col2 = isStom ? '#ffcc44' : '#cc88ff';
    ctx.save();
    const fg = ctx.createRadialGradient(f.x,f.y,0, f.x,f.y,14);
    fg.addColorStop(0, col2);
    fg.addColorStop(0.5, col1);
    fg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.arc(f.x, f.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Spell projectiles
  spellProjs.forEach(s => {
    ctx.save();
    const sg = ctx.createRadialGradient(s.x,s.y,0, s.x,s.y,16);
    sg.addColorStop(0, '#ffffff');
    sg.addColorStop(0.3, '#aa44ff');
    sg.addColorStop(1, 'rgba(102,0,204,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 16, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── DRAW PARTICLES ───────────────────────────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── DRAW DROPS ───────────────────────────────────────────────────────────────
function drawDrops() {
  drops.forEach(d => {
    if (d.collected) return;
    ctx.save();
    const pulse = 0.7 + 0.3*Math.sin(frame*0.12);
    if (d.type === 'hp') {
      const dg = ctx.createRadialGradient(d.x,d.y,0, d.x,d.y,14*pulse);
      dg.addColorStop(0, '#00ff88');
      dg.addColorStop(0.6, '#00cc55');
      dg.addColorStop(1, 'rgba(0,200,80,0)');
      ctx.fillStyle = dg;
      ctx.beginPath();
      ctx.arc(d.x, d.y, 14*pulse, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#00ff88';
      ctx.beginPath();
      ctx.arc(d.x, d.y, 6, 0, Math.PI*2);
      ctx.fill();
      // Cross symbol
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(d.x-1,d.y-5,2,10);
      ctx.fillRect(d.x-5,d.y-1,10,2);
    }
    ctx.restore();
  });
}

// ── DRAW HUD ─────────────────────────────────────────────────────────────────
function drawHUD() {
  // Boss HP bar background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, 22);

  // HP fill
  const bossHpFrac = Math.max(0, BOSS.hp / BOSS.maxHp);
  const bossHpGrad = ctx.createLinearGradient(0,0, W,0);
  bossHpGrad.addColorStop(0, '#8822cc');
  bossHpGrad.addColorStop(1, '#4400aa');
  ctx.fillStyle = bossHpGrad;
  ctx.fillRect(0, 0, W * bossHpFrac, 22);

  // Phase 2 marker at 50%
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(W/2 - 1, 0, 2, 22);

  // Boss name
  ctx.font = 'bold 11px Oswald, sans-serif';
  ctx.textAlign = 'left';
  if (!BOSS.revealed) {
    ctx.fillStyle = 'rgba(200,180,255,0.7)';
    ctx.fillText('???', 8, 15);
  } else {
    const nameAlpha = msgT > 100 ? (Math.sin(frame*0.3)*0.4+0.8) : 0.85;
    ctx.fillStyle = `rgba(220,180,255,${nameAlpha})`;
    ctx.fillText('Giant Tentacle Demon', 8, 15);
  }

  // Player HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(10, H-52, 150, 14);
  const plHpFrac = PL.hp / PL.maxHp;
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(10, H-52, 150*plHpFrac, 14);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, H-52, 150, 14);
  ctx.fillStyle = '#ffffff';
  ctx.font = '10px Oswald, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 14, H-42);

  // Shield pips
  const shBrokenFlash = PL.shBroken && Math.floor(frame/5)%2===0;
  for (let i=0; i<PL.shMaxHp; i++) {
    const px = 10 + i * 14;
    const py = H - 32;
    if (shBrokenFlash) {
      ctx.fillStyle = '#ff2222';
    } else if (i < PL.shHp && !PL.shBroken) {
      ctx.fillStyle = '#4499ff';
    } else {
      ctx.fillStyle = '#112244';
    }
    ctx.fillRect(px, py, 10, 10);
    ctx.strokeStyle = 'rgba(100,160,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, 10, 10);
  }

  // Spell count
  for (let i=0; i<PL.maxSpells; i++) {
    const px = 10 + i * 11;
    const py = H - 16;
    ctx.fillStyle = i < PL.spells ? '#aa44ff' : '#220044';
    ctx.beginPath();
    ctx.arc(px + 4, py + 4, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // Controls hint (first 300 frames)
  if (frame < 300 && gamePhase === 'fight') {
    const hintAlpha = frame < 240 ? 0.7 : 0.7*(1-(frame-240)/60);
    ctx.save();
    ctx.globalAlpha = hintAlpha;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2-160, H-68, 320, 16);
    ctx.fillStyle = '#ccaaff';
    ctx.font = '10px Oswald, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Z:Attack  X:Spell  C:Block  ↑↓:Row  ←→:Move', W/2, H-57);
    ctx.restore();
  }
}

  }

// ── UPDATE INTRO ─────────────────────────────────────────────────────────────
function updateIntro() {
  // Wave splash particles during big wave
  if (introT >= 240 && introT < 300 && frame%8===0) {
    for (let i=0; i<4; i++) {
      const wx = Math.random()*W;
      particles.push({x:wx, y:212, vx:(Math.random()-0.5)*3, vy:-3-Math.random()*4, life:20+Math.random()*15, maxLife:35, col:'#2060a0', sz:2});
    }
  }

  // Boss rising: spawn rocks
  if (introT >= 300 && introT < 510 && introT%20 < 1) {
    for (let i=0; i<4; i++) {
      const rx = Math.random()*W;
      spawnRockFromTop(rx);
    }
  }

  // Boss position animation
  if (introT >= 300 && introT < 450) {
    if (BOSS.y > BOSS_REST_Y) BOSS.y -= 4;
    else BOSS.y = BOSS_REST_Y;
  }
  if (introT >= 450 && introT < 510) {
    BOSS.y = BOSS_REST_Y + Math.sin(frame*0.25)*2;
    shakeMag = 2;
  }

  if (introT === 300) {
    SFX.bossRise();
    shakeMag = 4;
  }
  if (introT === 510) {
    BOSS.revealed = true;
    BOSS.y = BOSS_REST_Y;
    document.getElementById('room-title').textContent = 'Giant Tentacle Demon';
    msgText = 'GIANT TENTACLE DEMON';
    msgT = 200;
    shakeMag = 6;
    SFX.waveImpact();
  }
  if (introT === 540) {
    gamePhase = 'fight';
    idleT = 60;
    frame  = 0;
  }

  // Update rocks
  rocks = rocks.filter(r => {
    r.x += r.vx; r.y += r.vy;
    if (r.landed) {
      r.landedT = (r.landedT||0)+1;
      return r.landedT < 25;
    }
    if (r.y >= r.landY) {
      r.y = r.landY; r.landed = true;
      burst(r.landX, r.landY, '#806050', 8, 3);
      return true;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    return p.life>0;
  });

  if (shakeMag > 0) shakeMag -= 0.1;
  if (msgT > 0) msgT--;
}

// ── MAIN UPDATE ──────────────────────────────────────────────────────────────
function update() {
  // Input: movement
  if (K['ArrowLeft'])  { PL.x -= 4.5; PL.facing = -1; }
  if (K['ArrowRight']) { PL.x += 4.5; PL.facing =  1; }
  PL.x = Math.max(ROW_MIN_X, Math.min(ROW_MAX_X - WD_W, PL.x));

  // Row switch
  if (eat('ArrowUp')   && PL.row===0) PL.row=1;
  if (eat('ArrowDown') && PL.row===1) PL.row=0;

  // Knockback
  if (PL.knockVx) {
    PL.x += PL.knockVx;
    PL.knockVx *= 0.82;
    if (Math.abs(PL.knockVx)<0.3) PL.knockVx=0;
    PL.x = Math.max(ROW_MIN_X, Math.min(ROW_MAX_X-WD_W, PL.x));
  }

  // Shield broken recharge
  if (PL.shBroken && !K['KeyC']) { PL.shBroken=false; PL.shHp=PL.shMaxHp; }

  // Attack
  if (PL.atkTimer > 0) PL.atkTimer--;
  if (PL.atkCd > 0)    PL.atkCd--;
  if ((eat('KeyZ')||eat('Space')) && PL.atkTimer<=0 && PL.atkCd<=0 && !PL.sh) {
    PL.atkTimer = PL.atkDur; PL.atkCd = 30;
    SFX.playerAttack();
    BOSS.hp -= 18; BOSS.flashT = 6;
    BOSS.hp = Math.max(0, BOSS.hp);
    SFX.bossHurt();
    burst(400, BOSS.y+160, '#aa44ff', 8, 4);
    checkBossHpDrops();
    if (BOSS.hp <= 0) doVictory();
  }

  // Spell
  if (eat('KeyX') && PL.spells > 0 && PL.atkTimer<=0) {
    PL.spells--;
    SFX.playerSpell();
    spellProjs.push({ x: PL.x+WD_W/2, y: ROW_FEET[PL.row]-WD_H/2, vy: -8 });
  }

  // Timers
  if (PL.iframes>0) PL.iframes--;
  if (PL.dmgFlashT>0) PL.dmgFlashT--;
  if (BOSS.flashT>0) BOSS.flashT--;

  // Spell projectiles
  spellProjs = spellProjs.filter(s => {
    s.y += s.vy;
    if (s.y < 0) return false;
    if (s.y < BOSS.y + 310 && s.x > 50 && s.x < 750) {
      BOSS.hp -= 45; BOSS.flashT = 8;
      BOSS.hp = Math.max(0, BOSS.hp);
      burst(s.x, s.y, '#cc88ff', 14, 6); SFX.bossHurt();
      checkBossHpDrops();
      if (BOSS.hp<=0) doVictory();
      return false;
    }
    return true;
  });

  // Boss y animation (risen state)
  if (BOSS.risen) {
    if (BOSS.y > BOSS_RISEN_Y) BOSS.y -= 3;
  } else {
    if (BOSS.y < BOSS_REST_Y) BOSS.y += 3;
  }

  // Attack state machine
  if (CUR.type === null) {
    if (idleT > 0) { idleT--; }
    else { startNextAttack(); }
  } else {
    tickAttack();
  }

  // Warning timer decrements (also done in tickAttack but keep here as safety)
  // (already handled inside tickAttack)

  // Rocks update
  rocks = rocks.filter(r => {
    r.x += r.vx; r.y += r.vy;
    if (r.landed) {
      r.landedT = (r.landedT||0)+1;
      return r.landedT < 20;
    }
    if (r.y >= r.landY) {
      r.y = r.landY; r.landed = true;
      burst(r.landX, r.landY, '#806050', 12, 4); SFX.rockImpact();
      if (PL.iframes<=0) {
        const dist = Math.abs((PL.x+WD_W/2) - r.landX);
        if (dist < 55) hurtPlayer(15, 0);
      }
      return true;
    }
    return true;
  });

  // Fireballs update
  fireballs = fireballs.filter(f => {
    f.x += f.vx; f.y += f.vy;
    if (f.x < -20 || f.x > W+20 || f.y > H+20) return false;
    if (PL.iframes<=0) {
      const px = PL.x+WD_W/2, py = ROW_FEET[PL.row]-WD_H/2;
      const dist = Math.hypot(f.x-px, f.y-py);
      if (dist < 36) {
        hurtPlayer(f.dmg || 12, 0);
        burst(f.x, f.y, f.fromStomach ? '#ff8822' : '#aa44ff', 10, 5);
        return false;
      }
    }
    return true;
  });

  // Drops
  drops = drops.filter(d => {
    if (d.collected) return false;
    const px = PL.x+WD_W/2;
    const dy = ROW_FEET[PL.row];
    if (Math.abs(px - d.x) < 30 && Math.abs(dy - d.y) < 35) {
      collectDrop(d);
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--;
    return p.life>0;
  });

  // Screen shake decay
  if (shakeMag > 0) shakeMag -= 0.15;

  // Message timer
  if (msgT > 0) msgT--;
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function reset() {
  PL.hp = PL.maxHp;
  PL.shHp = PL.shMaxHp = 3;
  PL.shBroken = false;
  PL.atkTimer = 0; PL.atkCd = 0;
  PL.iframes = 0; PL.dmgFlashT = 0;
  PL.knockVx = 0;
  PL.spells = PL.maxSpells = 3;
  PL.row = 0; PL.x = 120; PL.facing = 1;

  BOSS.hp = BOSS.maxHp;
  BOSS.y = BOSS_INTRO_Y;
  BOSS.flashT = 0;
  BOSS.revealed = false;
  BOSS.risen = false;

  fireballs = []; rocks = []; spellProjs = []; particles = []; drops = [];
  smashWarnT = 0; smashWarnZ = 0;
  laserWarnT = 0;
  sweepWarnT = 0; sweepWarnRow = 0;

  CUR.type = null; CUR.phase = null; CUR.t = 0;
  idleT = 0;
  seqIdx = 0; cycleN = 0; p2Done = 0;

  hpDropsDone = [false, false];

  shakeMag = 0;
  msgText = ''; msgT = 0;

  document.getElementById('room-title').textContent = '???';

  frame = 0;
  introT = 0;
  gamePhase = 'intro';
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop() {
  ctx.save();
  if (shakeMag > 0.3) {
    ctx.translate(
      (Math.random()-0.5) * shakeMag * 2,
      (Math.random()-0.5) * shakeMag * 2
    );
  }

  if (gamePhase === 'intro' || gamePhase === 'fight' || gamePhase === 'dead' || gamePhase === 'victory') {
    drawBackground();
    drawBoss();
    drawPlatform();
    drawAttackEffects();
    if (gamePhase !== 'loading') drawWolfDragon(PL.x, PL.row, PL.facing, PL.atkTimer>0);
    drawParticles();
    drawDrops();
    if (gamePhase === 'fight' || gamePhase === 'dead' || gamePhase === 'victory') drawHUD();
    if (gamePhase === 'intro')   drawIntroOverlay();
    if (gamePhase === 'dead')    drawDeadScreen();
    if (gamePhase === 'victory') drawVictoryScreen();
    if (msgT > 0) drawMessage();
  }

  ctx.restore();

  if (gamePhase === 'intro') {
    introT++;
    updateIntro();
  } else if (gamePhase === 'fight') {
    update();
  }

  // Dead: retry
  if (gamePhase === 'dead' && (eat('KeyW') || eat('Space'))) reset();
  // Victory: return to world or retry
  if (gamePhase === 'victory' && eat('KeyW')) window.location.href = '/';

  frame++;
  requestAnimationFrame(loop);
}

// ── IMAGE LOADING & START ─────────────────────────────────────────────────────
function startLoading() {
  let loaded = 0;
  const total = 3;
  function onLoad() { if(++loaded===total) { gamePhase='intro'; } }

  const imgDemon = new Image();
  imgDemon.onload = () => { demonSheet = removeBg(imgDemon); onLoad(); };
  imgDemon.onerror = () => { demonSheet = document.createElement('canvas'); demonSheet.width=820; demonSheet.height=348; onLoad(); };
  imgDemon.src = '/images/boss-demon.png';

  const imgPlat = new Image();
  imgPlat.onload = () => { platSheet = removeBg(imgPlat); onLoad(); };
  imgPlat.onerror = () => { platSheet = document.createElement('canvas'); platSheet.width=800; platSheet.height=339; onLoad(); };
  imgPlat.src = '/images/platform-demon.png';

  const imgWD = new Image();
  imgWD.onload = () => { wdSheet = imgWD; onLoad(); };
  imgWD.onerror = () => { wdSheet = null; onLoad(); };
  imgWD.src = '/images/wolfdragon-sprite.png';
}

// Loading screen
(function waitLoop() {
  ctx.fillStyle='#01020a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#6622aa'; ctx.font='bold 24px monospace'; ctx.textAlign='center';
  ctx.fillText('Loading...', W/2, H/2);
  if (gamePhase==='loading') requestAnimationFrame(waitLoop);
})();

startLoading();
loop();

})();
</script>
