<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>??? — WOLFDRAGON</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Oswald:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    // Must be set BEFORE game.js loads
    window.WD_DEMON_MODE = true;
  </script>
</head>
<body style="background:#000;color:#e0e0f0;">

  <!-- Same structure as index.html game section, minus the other sections -->
  <header class="hero" style="padding:16px 20px 14px;min-height:0;">
    <div class="hero-inner">
      <h1 class="band-name" style="font-size:1.2rem;letter-spacing:0.2em;">WOLFDRAGON</h1>
    </div>
  </header>

  <nav style="display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:44px;background:#060408;border-bottom:2px solid #220044;">
    <a href="/" style="color:#8833dd;text-decoration:none;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.8;">← Back</a>
    <span id="room-title" style="font-family:'Metal Mania',cursive;font-size:1rem;color:#8833dd;letter-spacing:0.15em;text-shadow:0 0 12px #440088;">???</span>
    <div style="width:80px;"></div>
  </nav>

  <section class="game-section" id="game-section" style="border-top:none;padding-top:0;background:#000;padding-bottom:0;">
    <div class="game-controls-bar" style="background:#060008;border-color:#220044;color:#a070cc;">
      <span class="ctrl-key">← → ↑ ↓</span><span class="ctrl-label">Move</span>
      <span class="ctrl-sep">|</span>
      <span class="ctrl-key">Z</span><span class="ctrl-label">Attack</span>
      <span class="ctrl-sep">|</span>
      <span class="ctrl-key">X</span><span class="ctrl-label">Spell</span>
      <span class="ctrl-sep">|</span>
      <span class="ctrl-key">Hold C</span><span class="ctrl-label">Block</span>
      <span class="ctrl-sep">|</span>
      <span class="ctrl-key">W</span><span class="ctrl-label">Start</span>
    </div>

    <div class="game-canvas-wrap" style="max-width:min(100vw,calc(100vh * 5/3));width:100%;margin:0 auto;border-color:#220044;box-shadow:0 0 32px #220044;">
      <button id="fullscreen-btn" title="Fullscreen">⛶</button>
      <canvas id="game-canvas" width="800" height="480">
        Your browser does not support canvas.
      </canvas>
      <div class="game-coming-soon">
        <span>🐺🐉</span>
        <p>Loading...</p>
      </div>
      <div id="mobile-tap-start" class="mobile-tap-start">
        <span>🐺🐉</span>
        <p>TAP TO BEGIN</p>
      </div>
    </div>

    <div class="mobile-controls" id="mobile-controls">
      <div class="action-pad">
        <div class="action-row">
          <button class="act-btn btn-block"   data-key="KeyC">🛡<br><span>BLOCK</span></button>
          <button class="act-btn btn-special" data-key="KeyS">★<br><span>SPECIAL</span></button>
        </div>
        <div class="action-row">
          <button class="act-btn btn-attack"  data-key="KeyZ">⚔<br><span>ATTACK</span></button>
          <button class="act-btn btn-spell"   data-key="KeyX">✦<br><span>SPELL</span></button>
        </div>
      </div>
      <div class="dpad">
        <button class="dpad-btn dpad-up"    data-key="ArrowUp">▲</button>
        <button class="dpad-btn dpad-left"  data-key="ArrowLeft">◀</button>
        <div    class="dpad-center"></div>
        <button class="dpad-btn dpad-right" data-key="ArrowRight">▶</button>
        <button class="dpad-btn dpad-down"  data-key="ArrowDown">▼</button>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <a href="/">← Return to World</a> &nbsp;·&nbsp; WOLFDRAGON
  </footer>

  <script src="js/game.js"></script>
  <script>
    // Fullscreen button
    (function(){
      const btn  = document.getElementById('fullscreen-btn');
      const wrap = document.querySelector('.game-canvas-wrap');
      if(!btn||!wrap) return;
      btn.addEventListener('click', function(){
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
          btn.textContent = '✕';
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
          btn.textContent = '⛶';
        }
        btn.blur();
      });
      document.addEventListener('fullscreenchange', ()=>{ if(!document.fullscreenElement) btn.textContent='⛶'; });
      document.addEventListener('webkitfullscreenchange', ()=>{ if(!document.webkitFullscreenElement) btn.textContent='⛶'; });
    })();

    // Mobile touch controls
    (function(){
      if(!('ontouchstart' in window) && !navigator.maxTouchPoints) return;
      document.getElementById('mobile-controls').style.display = 'flex';
      const tapStart = document.getElementById('mobile-tap-start');
      function hideTap(){ tapStart.style.display='none'; }
      tapStart.addEventListener('touchstart', function(e){
        e.preventDefault(); hideTap();
        if(window._WD_J) window._WD_J['KeyW']=true;
        if(window._WD_K) window._WD_K['KeyW']=true;
        setTimeout(()=>{ if(window._WD_K) window._WD_K['KeyW']=false; },120);
      }, {passive:false});
      document.getElementById('game-canvas').addEventListener('touchstart', hideTap, {passive:true});
      document.querySelectorAll('.dpad-btn,.act-btn').forEach(function(btn){
        var code = btn.getAttribute('data-key');
        if(!code) return;
        btn.addEventListener('touchstart',e=>{e.preventDefault();if(window._WD_K){window._WD_K[code]=true;window._WD_J[code]=true;}btn.classList.add('pressed');},{passive:false});
        btn.addEventListener('touchend',  e=>{e.preventDefault();if(window._WD_K)window._WD_K[code]=false;btn.classList.remove('pressed');},{passive:false});
        btn.addEventListener('touchcancel',e=>{e.preventDefault();if(window._WD_K)window._WD_K[code]=false;btn.classList.remove('pressed');},{passive:false});
      });
    })();
  </script>
</body>
</html>
