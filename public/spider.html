<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider's Place — WOLFDRAGON</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Oswald:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #1ab8cc;
      --teal-dark:  #003a44;
      --teal-glow:  #40d0e8;
      --black:      #0a0a0a;
      --black-soft: #080e10;
      --white:      #f0f0f0;
      --cream:      #e0e8ec;
      --font-title: 'Metal Mania', cursive;
      --font-body:  'Oswald', sans-serif;
      --font-hand:  'Special Elite', cursive;
    }

    html, body {
      background: var(--black-soft);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV BAR ── */
    .room-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: #060c0e;
      border-bottom: 2px solid var(--teal-dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-home {
      color: var(--teal-glow);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .nav-home:hover { opacity: 1; }

    .room-title {
      font-family: var(--font-title);
      font-size: 1.1rem;
      color: var(--teal-glow);
      letter-spacing: 0.15em;
      text-shadow: 0 0 12px var(--teal);
    }

    .nav-spacer { width: 120px; }

    /* ── MAIN CANVAS AREA ── */
    .room-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      cursor: default;
    }

    #room {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: auto;
    }

    .hint-bar {
      width: 100%;
      max-width: 1400px;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: #1a4a52;
      text-transform: uppercase;
      background: #05090a;
      border-top: 1px solid #001a20;
    }

    /* ── HOVER TOOLTIP ── */
    #hover-hint {
      position: absolute;
      background: rgba(0,20,28,0.92);
      border: 1px solid var(--teal);
      color: var(--teal-glow);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      padding: 5px 12px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      border-radius: 2px;
      text-transform: uppercase;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #060e10;
      border: 2px solid var(--teal);
      box-shadow: 0 0 40px rgba(26,184,204,0.3);
      max-width: 580px;
      width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 28px 24px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: 1px solid #114444;
      color: var(--teal-glow);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--teal-dark); }

    .modal-title {
      font-family: var(--font-title);
      font-size: 1.4rem;
      color: var(--teal-glow);
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      text-shadow: 0 0 12px var(--teal);
    }
    .modal-title:empty { display: none; }

    .inspect-content {
      font-family: var(--font-hand);
      font-size: 1rem;
      color: var(--cream);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* ── FOOTER ── */
    .room-footer {
      background: #05090a;
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #112228;
      border-top: 1px solid #001a20;
    }
    .room-footer a {
      color: var(--teal);
      text-decoration: none;
    }
    .room-footer a:hover { color: var(--teal-glow); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #060c0e; }
    ::-webkit-scrollbar-thumb { background: var(--teal-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

    @media (max-width: 600px) {
      .room-nav { padding: 0 12px; }
      .room-title { font-size: 0.9rem; }
      .modal-box { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="room-nav">
    <a class="nav-home" href="/">← Back to World</a>
    <span class="room-title">Spider's Place</span>
    <div class="nav-spacer"></div>
  </nav>

  <!-- ── CANVAS ── -->
  <main class="room-main">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="room" width="1000" height="560"></canvas>
      <div id="hover-hint"></div>
    </div>
    <div class="hint-bar">Click items to interact &nbsp;·&nbsp; Mouse over to explore</div>
  </main>

  <!-- ── INSPECT MODAL ── -->
  <div class="modal-overlay" id="inspect-modal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button class="modal-close" id="inspect-close" aria-label="Close">×</button>
      <div class="modal-title" id="inspect-title"></div>
      <div class="inspect-content" id="inspect-content"></div>
    </div>
  </div>

  <footer class="room-footer">
    <a href="/">← Return to World</a> &nbsp;·&nbsp; WOLFDRAGON &nbsp;·&nbsp;
    <span style="color:#081418">All characters fictional</span>
  </footer>

<script>
(function () {
  const canvas  = document.getElementById('room');
  const ctx     = canvas.getContext('2d');
  const wrapper = document.getElementById('canvas-wrapper');
  const W = 1000, H = 560;
  let frame = 0;
  let mx = -1, my = -1;

  // ── MODAL ────────────────────────────────────────────────────────────────
  const modal    = document.getElementById('inspect-modal');
  const iTitle   = document.getElementById('inspect-title');
  const iContent = document.getElementById('inspect-content');
  const iClose   = document.getElementById('inspect-close');

  function openModal(title, body) {
    iTitle.textContent   = title || '';
    iContent.textContent = body  || '';
    modal.classList.add('open');
  }
  function closeModal() { modal.classList.remove('open'); }
  iClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── SKY / WINDOW ─────────────────────────────────────────────────────────
  function getSkyPhase() {
    const h = new Date().getHours() + new Date().getMinutes() / 60;
    if (h >= 5.5  && h < 8)    return 'dawn';
    if (h >= 8    && h < 18.5) return 'day';
    if (h >= 18.5 && h < 21)   return 'dusk';
    return 'night';
  }

  const SKY = {
    night: ['#01020a', '#03050e', '#050812'],
    dawn:  ['#0a0416', '#16081e', '#220c1a'],
    day:   ['#4a6a8a', '#6a8aaa', '#8aaccc'],
    dusk:  ['#100306', '#1c0608', '#2a0e0a'],
  };

  // ── ZONES ─────────────────────────────────────────────────────────────────
  // Specific foreground items first — they win over broad background zones.
  const ZONES = [
    {
      label: 'Main Terminal',
      test:  (x, y) => x >= 405 && x <= 658 && y >= 108 && y <= 320,
      title: 'Active Terminal',
      body:
`[SPIDER_OS v3.1.4 — SECURE SHELL]

> node_tracker --live
  ✓ 14 nodes active
  ! 3 anomalies flagged

> comms --status
  channel encrypted — OK

> scan sector_7
  3 contacts detected
  routing to WD for clearance

> _

All eyes on the grid tonight.
Nobody moves without her knowing.`,
    },
    {
      label: 'Comms Feed',
      test:  (x, y) => x >= 218 && x <= 384 && y >= 146 && y <= 326,
      title: 'Comms Feed',
      body:
`[ENCRYPTED CHANNEL — WOLFDRAGON NET]

WD: Status?
SPIDER: Three contacts moving through sector 7.
WD: Let them through.
SPIDER: Copy. Eyes on the other two.
WD: Good. Keep the net dark.
SPIDER: Always.

— channel idle —`,
    },
    {
      label: 'Intel Screen',
      test:  (x, y) => x >= 700 && x <= 848 && y >= 152 && y <= 322,
      title: 'Intel Screen',
      body:
`ASSET WATCH — LIVE FEED
━━━━━━━━━━━━━━━━━━━━━━━
[TARGET 01]  stationary  4h 22m
[TARGET 02]  silent      2h 08m+
[TARGET 03]  ACTIVE      moving SE ▶
[TARGET 04]  dormant     —
━━━━━━━━━━━━━━━━━━━━━━━
No action required.

Yet.`,
    },
    {
      label: 'Keyboard',
      test:  (x, y) => x >= 435 && x <= 648 && y >= 348 && y <= 374,
      title: 'Mechanical Keyboard',
      body:
`Custom build. Every key mapped.
Teal switches — tactile, 45g actuation.
She programs the macros herself.

The sound of this keyboard at 3am
means someone, somewhere,
just got found.`,
    },
    {
      label: 'Energy Drinks',
      test:  (x, y) => x >= 728 && x <= 802 && y >= 294 && y <= 328,
      title: 'The Fuel Stack',
      body:
`Four cans deep tonight.
The fifth one is "just in case."

She keeps count, technically.
The count just keeps getting higher.

Nobody says anything about it.`,
    },
    {
      label: 'Spider Plant',
      test:  (x, y) => x >= 160 && x <= 255 && y >= 262 && y <= 328,
      title: 'Charlotte',
      body:
`The spider plant's name is Charlotte.

Spider insists this is not a bit.

She waters it every Tuesday.
Charlotte is the only living thing
in this room that doesn't get surveilled.

"She deserves her privacy."`,
    },
    {
      label: 'Tactical Gear',
      test:  (x, y) => x >= 862 && x <= 978 && y >= 386 && y <= 502,
      title: 'Field Kit',
      body:
`Go-bag. Always packed.
15 minutes from door to grid,
anywhere in the city.

Contents: encrypted drives, burner hardware,
signal jammer, trauma kit, zip ties,
and something she doesn't name out loud.

"I don't go looking for problems.
Problems just have a way of finding
this address."`,
    },
    {
      label: 'Window',
      test:  (x, y) => x >= 42 && x <= 198 && y >= 72 && y <= 275,
      title: 'City View',
      body:
`Third floor. North-facing.
She picked this apartment for the sight lines.

The city never really goes dark.
That's what she likes about it —
there's always something moving out there,
and she can see all of it.`,
    },
  ];

  function zoneAt(x, y) {
    return ZONES.find(z => z.test(x, y)) || null;
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── ROOM SHELL ────────────────────────────────────────────────────────────
  function drawRoom() {
    // Back wall
    ctx.fillStyle = '#090d11';
    ctx.fillRect(0, 0, W, 376);

    // Ceiling LED strip glow (pulsing)
    const ledPulse = 0.55 + 0.2 * Math.sin(frame * 0.018);
    const ceilGrad = ctx.createLinearGradient(0, 0, 0, 55);
    ceilGrad.addColorStop(0, `rgba(26,184,204,${ledPulse * 0.22})`);
    ceilGrad.addColorStop(1, 'rgba(26,184,204,0)');
    ctx.fillStyle = ceilGrad;
    ctx.fillRect(0, 0, W, 55);

    // LED strip line itself
    ctx.strokeStyle = `rgba(64,208,232,${ledPulse * 0.55})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(W, 2); ctx.stroke();

    // Left wall sliver (before window)
    ctx.fillStyle = '#07090d';
    ctx.fillRect(0, 0, 42, 376);

    // Right wall darkening
    const rwGrad = ctx.createLinearGradient(840, 0, W, 0);
    rwGrad.addColorStop(0, 'rgba(0,0,0,0)');
    rwGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = rwGrad;
    ctx.fillRect(840, 0, 160, 376);

    // Floor
    const floorGrad = ctx.createLinearGradient(0, 376, 0, H);
    floorGrad.addColorStop(0, '#141a1e');
    floorGrad.addColorStop(1, '#0c1014');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, 376, W, H - 376);

    // Floor perspective grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 8; i++) {
      const fx = i * 130;
      ctx.beginPath(); ctx.moveTo(fx, 376); ctx.lineTo(500 + (fx - 500) * 0.25, H); ctx.stroke();
    }

    // Wall/floor seam
    ctx.strokeStyle = 'rgba(26,184,204,0.10)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 376); ctx.lineTo(W, 376); ctx.stroke();

    // Under-desk area rug
    const rugGrad = ctx.createLinearGradient(165, 376, 165, 495);
    rugGrad.addColorStop(0, 'rgba(18,36,46,0.55)');
    rugGrad.addColorStop(1, 'rgba(8,16,22,0.15)');
    ctx.fillStyle = rugGrad;
    rrect(170, 378, 710, 115, 5);
    ctx.fill();
  }

  // ── WINDOW ────────────────────────────────────────────────────────────────
  function drawWindow() {
    const phase = getSkyPhase();
    const sky   = SKY[phase];
    const wx = 42, wy = 72, ww = 156, wh = 204;

    // Outer frame
    ctx.fillStyle = '#0c1216';
    rrect(wx - 6, wy - 6, ww + 12, wh + 12, 3);
    ctx.fill();

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(wx, wy, wx, wy + wh);
    skyGrad.addColorStop(0, sky[0]);
    skyGrad.addColorStop(0.5, sky[1]);
    skyGrad.addColorStop(1, sky[2]);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(wx, wy, ww, wh);

    // City silhouette
    ctx.fillStyle = phase === 'day' ? '#1a2a38' : '#06090e';
    const buildings = [
      [0, 30,18,100],[20,15,22,115],[44,40,16,90],[62,22,20,108],
      [84, 8,24,122],[110,32,18,98],[130,18,20,112],[152,12,4,118],
    ];
    buildings.forEach(([bx, bh, bw, by]) => {
      ctx.fillRect(wx + bx, wy + wh - by, bw, by);
    });

    // City window lights
    const lightA = phase === 'day' ? 0.06 : 0.5 + 0.08 * Math.sin(frame * 0.03);
    ctx.fillStyle = `rgba(200,220,140,${lightA})`;
    const litWins = [
      [6,505],[6,488],[25,498],[50,462],[50,478],[68,510],[68,492],
      [90,472],[90,488],[90,504],[116,470],[116,486],[136,492],[136,476],
    ];
    litWins.forEach(([lx, ly]) => {
      if (ly > wy && ly < wy + wh - 2) ctx.fillRect(wx + lx, ly, 4, 3);
    });

    // Moon (night only)
    if (phase === 'night') {
      ctx.fillStyle = '#ccd8e0';
      ctx.beginPath(); ctx.arc(wx + 125, wy + 28, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = sky[1];
      ctx.beginPath(); ctx.arc(wx + 129, wy + 25, 9,  0, Math.PI * 2); ctx.fill();
    }

    // Dawn/dusk glow
    if (phase === 'dawn' || phase === 'dusk') {
      const sunCol = phase === 'dawn' ? 'rgba(210,110,55,0.38)' : 'rgba(190,70,35,0.33)';
      const sg = ctx.createRadialGradient(wx + 128, wy + wh, 5, wx + 128, wy + wh, 65);
      sg.addColorStop(0, sunCol); sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg; ctx.fillRect(wx, wy, ww, wh);
    }

    // Window cross divider
    ctx.strokeStyle = '#0c1216';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(wx + ww / 2, wy); ctx.lineTo(wx + ww / 2, wy + wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx, wy + wh / 2); ctx.lineTo(wx + ww, wy + wh / 2); ctx.stroke();

    // Frame border
    ctx.strokeStyle = '#18242a';
    ctx.lineWidth = 2;
    ctx.strokeRect(wx, wy, ww, wh);

    // Ambient glow from window on wall
    const winGlow = ctx.createRadialGradient(wx + ww / 2, wy + wh / 2, 20, wx + ww / 2, wy + wh / 2, 160);
    winGlow.addColorStop(0, 'rgba(130,170,200,0.04)');
    winGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = winGlow;
    ctx.fillRect(0, 0, 250, 380);
  }

  // ── DESK ──────────────────────────────────────────────────────────────────
  function drawDesk() {
    // Desk surface
    const dGrad = ctx.createLinearGradient(0, 326, 0, 364);
    dGrad.addColorStop(0, '#1c2428');
    dGrad.addColorStop(1, '#141c20');
    ctx.fillStyle = dGrad;
    ctx.fillRect(164, 326, 728, 38);

    // Top edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(164, 326, 728, 2);

    // Bottom shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(164, 362, 728, 5);

    // Legs
    ctx.fillStyle = '#141c20';
    ctx.fillRect(188, 364, 18, 78);
    ctx.fillRect(870, 364, 18, 78);
    ctx.fillRect(490, 364, 14, 56);

    // Under-desk LED strip (pulsing teal)
    const dLed = 0.28 + 0.10 * Math.sin(frame * 0.025 + 1.5);
    ctx.fillStyle = `rgba(26,184,204,${dLed})`;
    ctx.fillRect(202, 362, 682, 2);

    const dGlow = ctx.createLinearGradient(0, 363, 0, 400);
    dGlow.addColorStop(0, `rgba(26,184,204,${dLed * 0.45})`);
    dGlow.addColorStop(1, 'rgba(26,184,204,0)');
    ctx.fillStyle = dGlow;
    ctx.fillRect(202, 363, 682, 38);
  }

  // ── MAIN MONITOR ──────────────────────────────────────────────────────────
  function drawMainMonitor() {
    // Stand
    ctx.fillStyle = '#1a2025';
    ctx.fillRect(520, 318, 22, 10);
    ctx.fillRect(502, 326, 58, 5);

    // Bezel
    ctx.fillStyle = '#0c1216';
    rrect(392, 96, 278, 228, 6);
    ctx.fill();

    // Screen background
    const sGrad = ctx.createLinearGradient(405, 108, 405, 320);
    sGrad.addColorStop(0, '#050d12');
    sGrad.addColorStop(1, '#030a0f');
    ctx.fillStyle = sGrad;
    ctx.fillRect(405, 108, 254, 213);

    // Terminal text
    ctx.font = '9px "Courier New", monospace';
    ctx.textAlign = 'left';
    const lines = [
      { t: 'SPIDER_OS v3.1.4',       c: 'rgba(26,184,204,0.92)' },
      { t: '━━━━━━━━━━━━━━━━━━━━━',  c: 'rgba(26,184,204,0.22)' },
      { t: '> node_tracker --live',   c: 'rgba(100,215,235,0.72)' },
      { t: '  ✓ 14 nodes active',     c: 'rgba(80,205,100,0.82)' },
      { t: '  ! 3 anomalies flagged', c: 'rgba(225,165,40,0.88)' },
      { t: '> comms --status',        c: 'rgba(100,215,235,0.72)' },
      { t: '  encrypted — OK',        c: 'rgba(80,205,100,0.82)' },
      { t: '> scan sector_7',         c: 'rgba(100,215,235,0.72)' },
      { t: '  3 contacts detected',   c: 'rgba(225,165,40,0.88)' },
      { t: '  routing to WD',         c: 'rgba(180,220,240,0.58)' },
      { t: '> _',                     c: 'rgba(26,184,204,0.92)' },
    ];
    lines.forEach((l, i) => {
      ctx.fillStyle = l.c;
      ctx.fillText(l.t, 416, 128 + i * 16);
    });

    // Blinking cursor block
    if (Math.floor(frame / 28) % 2 === 0) {
      ctx.fillStyle = 'rgba(26,184,204,0.88)';
      ctx.fillRect(430, 297, 7, 10);
    }

    // Screen ambient glow
    const mGlow = ctx.createRadialGradient(532, 214, 45, 532, 214, 185);
    mGlow.addColorStop(0, 'rgba(26,184,204,0.07)');
    mGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mGlow;
    ctx.fillRect(345, 60, 375, 320);

    // Screen top reflection
    ctx.fillStyle = 'rgba(255,255,255,0.018)';
    ctx.fillRect(405, 108, 254, 1);

    // Power LED pulse
    const pLed = 0.55 + 0.45 * Math.sin(frame * 0.04);
    ctx.fillStyle = `rgba(26,184,204,${pLed})`;
    ctx.beginPath(); ctx.arc(527, 318, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // ── SIDE MONITORS ─────────────────────────────────────────────────────────
  function drawSideMonitors() {
    // ── LEFT MONITOR ──
    ctx.fillStyle = '#1a2025';
    ctx.fillRect(289, 318, 16, 9);
    ctx.fillRect(273, 325, 48, 5);

    ctx.fillStyle = '#0c1216';
    rrect(207, 136, 180, 194, 5);
    ctx.fill();

    ctx.fillStyle = '#040a0e';
    ctx.fillRect(218, 147, 158, 174);

    ctx.font = '8px "Courier New", monospace';
    const commsLines = [
      { t: '[ENCRYPTED CH]',       c: 'rgba(26,184,204,0.72)' },
      { t: '─────────────',        c: 'rgba(26,184,204,0.18)' },
      { t: 'WD: Status?',          c: 'rgba(175,215,235,0.62)' },
      { t: 'SP: 3 in sector 7',    c: 'rgba(100,215,230,0.78)' },
      { t: 'WD: Let them thru',    c: 'rgba(175,215,235,0.62)' },
      { t: 'SP: Copy. Eyes on 2',  c: 'rgba(100,215,230,0.78)' },
      { t: 'WD: Keep net dark',    c: 'rgba(175,215,235,0.62)' },
      { t: 'SP: Always.',          c: 'rgba(100,215,230,0.78)' },
      { t: '─────────────',        c: 'rgba(26,184,204,0.18)' },
      { t: '   idle...',           c: 'rgba(80,140,160,0.50)' },
    ];
    commsLines.forEach((l, i) => {
      ctx.fillStyle = l.c;
      ctx.fillText(l.t, 226, 163 + i * 15);
    });

    const lGlow = ctx.createRadialGradient(297, 234, 18, 297, 234, 120);
    lGlow.addColorStop(0, 'rgba(26,184,204,0.045)');
    lGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lGlow;
    ctx.fillRect(155, 95, 290, 280);

    // ── RIGHT MONITOR ──
    ctx.fillStyle = '#1a2025';
    ctx.fillRect(760, 316, 16, 11);
    ctx.fillRect(744, 325, 48, 5);

    ctx.fillStyle = '#0c1216';
    rrect(693, 142, 166, 188, 5);
    ctx.fill();

    ctx.fillStyle = '#040a0e';
    ctx.fillRect(704, 153, 144, 168);

    const intelLines = [
      { t: 'ASSET WATCH',     c: 'rgba(26,184,204,0.82)' },
      { t: '──────────────',  c: 'rgba(26,184,204,0.18)' },
      { t: '[01] stationary', c: 'rgba(80,205,100,0.72)' },
      { t: '[02] silent 2h+', c: 'rgba(225,165,40,0.72)' },
      { t: '[03] MOVING SE ▶',c: 'rgba(220,75,55,0.90)' },
      { t: '[04] dormant',    c: 'rgba(80,205,100,0.72)' },
      { t: '──────────────',  c: 'rgba(26,184,204,0.18)' },
      { t: 'no action req.',  c: 'rgba(120,160,180,0.52)' },
    ];
    intelLines.forEach((l, i) => {
      ctx.fillStyle = l.c;
      ctx.fillText(l.t, 712, 171 + i * 18);
    });

    const rGlow = ctx.createRadialGradient(776, 238, 18, 776, 238, 115);
    rGlow.addColorStop(0, 'rgba(26,184,204,0.045)');
    rGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rGlow;
    ctx.fillRect(640, 98, 280, 290);
  }

  // ── KEYBOARD ──────────────────────────────────────────────────────────────
  function drawKeyboard() {
    const kx = 435, ky = 348, kw = 214, kh = 24;
    ctx.fillStyle = '#141c20';
    rrect(kx, ky, kw, kh, 3);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    rrect(kx, ky, kw, 2, 1);
    ctx.fill();

    // Key caps with teal LED glow
    const kLed = 0.55 + 0.22 * Math.sin(frame * 0.02);
    ctx.fillStyle = `rgba(26,184,204,${kLed * 0.28})`;
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 18; col++) {
        rrect(kx + 6 + col * 11.4, ky + 4 + row * 6.5, 9.5, 4.5, 1);
        ctx.fill();
      }
    }

    // Keyboard underglow spill
    const kgGrad = ctx.createLinearGradient(kx, ky + kh, kx, ky + kh + 22);
    kgGrad.addColorStop(0, `rgba(26,184,204,${kLed * 0.20})`);
    kgGrad.addColorStop(1, 'rgba(26,184,204,0)');
    ctx.fillStyle = kgGrad;
    ctx.fillRect(kx, ky + kh, kw, 22);
  }

  // ── ENERGY DRINKS ─────────────────────────────────────────────────────────
  function drawEnergyDrinks() {
    const cans = [
      { x: 732, brand: 'teal'   },
      { x: 747, brand: 'teal'   },
      { x: 762, brand: 'teal'   },
      { x: 778, brand: 'purple' },  // different brand, been here longest
    ];

    cans.forEach(({ x: cx, brand }) => {
      const cy = 294, cw = 13, ch = 33;
      const baseCol = brand === 'purple' ? '#1e1828' : '#182428';

      const cGrad = ctx.createLinearGradient(cx, cy, cx + cw, cy);
      cGrad.addColorStop(0,   baseCol);
      cGrad.addColorStop(0.4, '#283a40');
      cGrad.addColorStop(1,   baseCol);
      ctx.fillStyle = cGrad;
      rrect(cx, cy, cw, ch, 2);
      ctx.fill();

      // Can top
      ctx.fillStyle = '#24343a';
      ctx.fillRect(cx + 1, cy, cw - 2, 5);
      // Pull tab
      ctx.fillStyle = '#303e44';
      ctx.fillRect(cx + 4, cy - 2, 5, 3);

      // Highlight stripe
      ctx.fillStyle = 'rgba(255,255,255,0.055)';
      ctx.fillRect(cx + 2, cy + 6, 2, ch - 12);

      // Logo band
      const bandCol = brand === 'purple'
        ? 'rgba(140,55,200,0.52)'
        : 'rgba(26,184,204,0.48)';
      ctx.fillStyle = bandCol;
      ctx.fillRect(cx, cy + 10, cw, 7);
    });
  }

  // ── SPIDER PLANT (on desk corner) ─────────────────────────────────────────
  function drawSpiderPlant() {
    const px = 200, py = 316;

    // Pot
    ctx.fillStyle = '#1e282e';
    ctx.beginPath();
    ctx.moveTo(px - 11, py + 1);
    ctx.lineTo(px + 11, py + 1);
    ctx.lineTo(px + 9,  py + 12);
    ctx.lineTo(px - 9,  py + 12);
    ctx.closePath();
    ctx.fill();

    // Pot rim
    ctx.fillStyle = '#283438';
    ctx.fillRect(px - 13, py - 1, 26, 5);

    // Soil
    ctx.fillStyle = '#141a18';
    ctx.fillRect(px - 10, py + 1, 20, 4);

    // Leaf strands (spider plants have long arching leaves)
    const leafData = [
      { cp1: [px - 38, py - 18], cp2: [px - 60, py + 8],  end: [px - 66, py + 22], stripe: true  },
      { cp1: [px + 40, py - 16], cp2: [px + 62, py + 6],  end: [px + 68, py + 20], stripe: true  },
      { cp1: [px - 18, py - 28], cp2: [px - 24, py - 38], end: [px - 20, py - 40], stripe: false },
      { cp1: [px + 16, py - 30], cp2: [px + 22, py - 40], end: [px + 18, py - 42], stripe: false },
      { cp1: [px - 50, py - 5],  cp2: [px - 78, py + 28], end: [px - 85, py + 42], stripe: true  },
      { cp1: [px + 48, py - 4],  cp2: [px + 76, py + 26], end: [px + 82, py + 40], stripe: true  },
    ];

    leafData.forEach(({ cp1, cp2, end, stripe }) => {
      ctx.strokeStyle = '#2e6a34';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.bezierCurveTo(cp1[0], cp1[1], cp2[0], cp2[1], end[0], end[1]);
      ctx.stroke();

      if (stripe) {
        ctx.strokeStyle = 'rgba(155,210,150,0.50)';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(px + 1, py);
        ctx.bezierCurveTo(cp1[0]+1, cp1[1], cp2[0]+1, cp2[1], end[0]+1, end[1]);
        ctx.stroke();
      }
    });

    // Little dangling plantlet on longest left strand
    ctx.fillStyle = '#3a7a40';
    ctx.beginPath(); ctx.arc(px - 68, py + 16, 4.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(150,210,148,0.45)';
    ctx.beginPath(); ctx.arc(px - 68, py + 16, 2.5, 0, Math.PI * 2); ctx.fill();

    ctx.lineWidth = 1;
  }

  // ── TACTICAL GEAR ─────────────────────────────────────────────────────────
  function drawTacticalGear() {
    const gx = 870, gy = 392;

    // Main bag body
    const bagGrad = ctx.createLinearGradient(gx, gy, gx + 92, gy + 75);
    bagGrad.addColorStop(0, '#1a1e22');
    bagGrad.addColorStop(1, '#0e1214');
    ctx.fillStyle = bagGrad;
    rrect(gx, gy + 18, 92, 72, 7);
    ctx.fill();

    // Flap
    ctx.fillStyle = '#141a1c';
    rrect(gx + 4, gy + 16, 84, 32, 5);
    ctx.fill();
    ctx.strokeStyle = '#1e2a2e';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx + 4, gy + 16, 84, 32);

    // MOLLE webbing
    ctx.strokeStyle = '#202c30';
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(gx + 14 + i * 19, gy + 23);
      ctx.lineTo(gx + 14 + i * 19, gy + 52);
      ctx.stroke();
    }

    // Side straps
    ctx.fillStyle = '#1a2428';
    ctx.fillRect(gx - 7, gy + 32, 8, 38);
    ctx.fillRect(gx + 91, gy + 32, 8, 38);

    // Center buckle
    ctx.strokeStyle = '#3a4a50';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(gx + 36, gy + 50, 18, 9);
    ctx.beginPath(); ctx.moveTo(gx + 45, gy + 50); ctx.lineTo(gx + 45, gy + 59); ctx.stroke();

    // Small teal patch
    ctx.fillStyle = 'rgba(26,184,204,0.22)';
    ctx.fillRect(gx + 62, gy + 25, 22, 13);
    ctx.strokeStyle = 'rgba(26,184,204,0.35)';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(gx + 62, gy + 25, 22, 13);

    // Bag shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    rrect(gx + 5, gy + 86, 90, 7, 3);
    ctx.fill();

    ctx.lineWidth = 1;
  }

  // ── HOVER HIGHLIGHT ───────────────────────────────────────────────────────
  function drawHoverHighlight(zone) {
    if (!zone) return;
    const bounds = {
      'Main Terminal': [403, 106, 257, 216],
      'Comms Feed':    [216, 144, 162, 184],
      'Intel Screen':  [698, 150, 152, 174],
      'Keyboard':      [433, 346, 218, 30],
      'Energy Drinks': [726, 292, 78,  38],
      'Spider Plant':  [155, 260, 105, 72],
      'Tactical Gear': [858, 388, 122, 116],
      'Window':        [40,  70,  162, 208],
    };
    const b = bounds[zone.label];
    if (!b) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(26,184,204,0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    rrect(b[0] - 2, b[1] - 2, b[2] + 4, b[3] + 4, 3);
    ctx.stroke();
    ctx.restore();
  }

  // ── MAIN LOOP ─────────────────────────────────────────────────────────────
  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawRoom();
    drawWindow();
    drawDesk();
    drawMainMonitor();
    drawSideMonitors();
    drawKeyboard();
    drawEnergyDrinks();
    drawSpiderPlant();
    drawTacticalGear();

    const hz = zoneAt(mx, my);
    if (hz) drawHoverHighlight(hz);

    frame++;
    requestAnimationFrame(draw);
  }
  draw();

  // ── MOUSE EVENTS ──────────────────────────────────────────────────────────
  const hint = document.getElementById('hover-hint');

  function getCanvasXY(e) {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return [(e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY];
  }

  canvas.addEventListener('mousemove', e => {
    [mx, my] = getCanvasXY(e);
    const zone = zoneAt(mx, my);
    if (zone) {
      const wRect = wrapper.getBoundingClientRect();
      hint.style.display = 'block';
      hint.style.left    = (e.clientX - wRect.left + 14) + 'px';
      hint.style.top     = (e.clientY - wRect.top  - 28) + 'px';
      hint.textContent   = zone.label;
      canvas.style.cursor = 'pointer';
    } else {
      hint.style.display  = 'none';
      canvas.style.cursor = 'default';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    mx = -1; my = -1;
    hint.style.display  = 'none';
    canvas.style.cursor = 'default';
  });

  canvas.addEventListener('click', e => {
    const [cx, cy] = getCanvasXY(e);
    const zone = zoneAt(cx, cy);
    if (zone) openModal(zone.title, zone.body);
  });
})();
</script>
