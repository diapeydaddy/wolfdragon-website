<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e0e14; color: #e8e0d0; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }

    /* ── NAV ── */
    #top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: #0a0a10;
      border-bottom: 1px solid rgba(180,20,20,0.25);
    }
    #top-nav a.home-link {
      color: #c8a840; text-decoration: none; font-size: 0.85rem;
      letter-spacing: 0.06em; opacity: 0.8; transition: opacity 0.15s;
    }
    #top-nav a.home-link:hover { opacity: 1; }
    #top-nav .room-title {
      font-size: 0.9rem; font-weight: 600; letter-spacing: 0.12em;
      color: #cc2222; text-transform: uppercase;
    }
    #top-nav .spacer { width: 120px; }

    /* ── CANVAS WRAPPER ── */
    #canvas-wrap {
      width: 100%; max-width: 1400px; margin: 18px auto 0;
      padding: 0 16px;
    }
    #room {
      display: block; width: 100%; height: auto;
      border: 1px solid rgba(180,20,20,0.2);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(140,0,0,0.18), 0 4px 24px rgba(0,0,0,0.7);
      cursor: default;
    }

    /* ── MODAL ── */
    #inspect-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78); z-index: 100;
      align-items: center; justify-content: center;
    }
    #inspect-modal.open { display: flex; }
    #inspect-inner {
      background: #16161e; border: 1px solid rgba(180,20,20,0.35);
      border-radius: 6px; width: min(580px, 92vw);
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 48px rgba(0,0,0,0.85);
      overflow: hidden;
    }
    #inspect-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    #inspect-icon { font-size: 1.5rem; }
    #inspect-title { font-size: 1rem; font-weight: 600; color: #e8e0d0; flex: 1; }
    #inspect-title:empty { display: none; }
    #inspect-close {
      background: none; border: none; color: #888; font-size: 1.4rem;
      cursor: pointer; line-height: 1; padding: 2px 4px;
      transition: color 0.15s;
    }
    #inspect-close:hover { color: #e8e0d0; }
    #inspect-body {
      padding: 18px; overflow-y: auto; flex: 1;
    }
    .inspect-content {
      font-size: 0.92rem; line-height: 1.65; color: #c8c0b0;
      white-space: pre-wrap;
    }
    .modal-hint {
      font-size: 0.75rem; color: #666; text-align: center;
      padding: 10px 0 4px; border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    /* Scrollbar */
    #inspect-body::-webkit-scrollbar { width: 6px; }
    #inspect-body::-webkit-scrollbar-track { background: #12121a; }
    #inspect-body::-webkit-scrollbar-thumb { background: #3a2020; border-radius: 3px; }
  </style>
</head>

  // ── DRAW HELPERS ─────────────────────────────────────────────────────────────
  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

    ceilGrad.addColorStop(0, '#0e0e14');
    ceilGrad.addColorStop(1, '#161620');
    ctx.fillStyle = ceilGrad;
    ctx.fillRect(0, 0, W, 92);

    // Ceiling tiles (corporate grid)
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 80) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 92); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, 46); ctx.lineTo(W, 46); ctx.stroke();

    // Recessed LED lights
    [220, 500, 780].forEach(lx => {
      const pulse = 0.85 + Math.sin(frame * 0.03) * 0.08;
      ctx.fillStyle = `rgba(230,240,255,${0.12 * pulse})`;
      ctx.beginPath(); ctx.ellipse(lx, 88, 35, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(200,220,255,${0.35 * pulse})`;
      ctx.beginPath(); ctx.ellipse(lx, 88, 18, 3, 0, 0, Math.PI * 2); ctx.fill();
      // Light cone
      const coneGrad = ctx.createRadialGradient(lx, 90, 0, lx, 90, 280);
      coneGrad.addColorStop(0, `rgba(220,235,255,${0.07 * pulse})`);
      coneGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = coneGrad;
      ctx.beginPath(); ctx.ellipse(lx, 220, 160, 180, 0, 0, Math.PI * 2); ctx.fill();
    });

    // Back wall
    const wallGrad = ctx.createLinearGradient(0, 92, 0, 388);
    wallGrad.addColorStop(0, '#1c1c28');
    wallGrad.addColorStop(1, '#181820');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 92, W, 296);

    // Vertical panel lines (wainscoting)
    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.lineWidth = 1;
    [165, 330, 500, 665, 835].forEach(px => {
      ctx.beginPath(); ctx.moveTo(px, 92); ctx.lineTo(px, 388); ctx.stroke();
    });
    // Chair rail
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 228); ctx.lineTo(W, 228); ctx.stroke();

    // Red accent strip (evil mood lighting along chair rail)
    const redStrip = ctx.createLinearGradient(0, 225, 0, 235);
    redStrip.addColorStop(0, 'rgba(140,0,0,0.0)');
    redStrip.addColorStop(0.5, 'rgba(140,0,0,0.14)');
    redStrip.addColorStop(1, 'rgba(140,0,0,0.0)');
    ctx.fillStyle = redStrip;
    ctx.fillRect(0, 225, W, 10);

    // Floor
    const floorGrad = ctx.createLinearGradient(0, 388, 0, H);
    floorGrad.addColorStop(0, '#1a1208');
    floorGrad.addColorStop(1, '#120e06');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, 388, W, H - 388);

    // Floor planks (perspective converging lines)
    ctx.lineWidth = 1;
    for (let y = 400; y < H; y += 20) {
      ctx.strokeStyle = `rgba(0,0,0,${0.2 + (y - 400) / (H - 400) * 0.12})`;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    [110, 225, 340, 455, 570, 685, 800, 915].forEach(x => {
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, 388); ctx.lineTo(x, H); ctx.stroke();
    });

    // Baseboard
    const bbGrad = ctx.createLinearGradient(0, 378, 0, 392);
    bbGrad.addColorStop(0, '#1a1010');
    bbGrad.addColorStop(1, '#221414');
    ctx.fillStyle = bbGrad;
    ctx.fillRect(0, 378, W, 14);

    // Ambient red glow from Apoc
    const apocGlow = ctx.createRadialGradient(apocX, apocY, 0, apocX, apocY, 320);
    apocGlow.addColorStop(0, 'rgba(180,10,10,0.05)');
    apocGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = apocGlow;
    ctx.fillRect(0, 0, W, H);
  }

  // ── SKY PHASE (time-aware) ───────────────────────────────────────────────────
  function getSkyPhase() {
    const h = new Date().getHours() + new Date().getMinutes() / 60;
    if (h >= 5.5  && h < 7.5)  return 'dawn';
    if (h >= 7.5  && h < 18.5) return 'day';
    if (h >= 18.5 && h < 20.5) return 'dusk';
    return 'night';
  }

  // ── CITY WINDOW ─────────────────────────────────────────────────────────────
  function drawWindow() {
    const wx = 166, wy = 95, ww = 320, wh = 290;
    const hov = hoveredZone && hoveredZone.id === 'window';
    const phase = getSkyPhase();

    // Sky gradient colors per phase
    const SKY = {
      night: ['#05080e', '#080d1a', '#0c1828'],
      dawn:  ['#0e0618', '#200e24', '#341828'],
      day:   ['#3a9ad8', '#5ab0e8', '#7cc8f8'],  // clear sunny blue sky
      dusk:  ['#160408', '#280808', '#3c1010'],
    };
    const sc = SKY[phase];

    // Window frame (dark metal)
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(wx - 8, wy - 6, ww + 16, wh + 12);
    ctx.fillStyle = '#242430';
    ctx.fillRect(wx - 4, wy - 2, ww + 8, wh + 6);

    // Glass — sky gradient
    const skyGrad = ctx.createLinearGradient(wx, wy, wx, wy + wh);
    skyGrad.addColorStop(0,   sc[0]);
    skyGrad.addColorStop(0.6, sc[1]);
    skyGrad.addColorStop(1,   sc[2]);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(wx, wy, ww, wh);

    // Horizon glow (varies by phase)
    const horizColors = {
      night: 'rgba(80,120,200,0.12)',
      dawn:  'rgba(255,100,40,0.30)',
      day:   'rgba(255,240,180,0.22)',  // warm haze near buildings
      dusk:  'rgba(255,70,15,0.36)',
    };
    const horizGlow = ctx.createRadialGradient(wx + ww * 0.5, wy + wh * 0.82, 0, wx + ww * 0.5, wy + wh * 0.82, 200);
    horizGlow.addColorStop(0, horizColors[phase]);
    horizGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = horizGlow;
    ctx.fillRect(wx, wy, ww, wh);

    // Celestial body: moon at night, sun at others
    if (phase === 'night') {
      ctx.fillStyle = 'rgba(210,210,170,0.18)';
      ctx.beginPath(); ctx.arc(wx + ww * 0.82, wy + 28, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(210,210,160,0.12)';
      ctx.beginPath(); ctx.arc(wx + ww * 0.82, wy + 28, 26, 0, Math.PI * 2); ctx.fill();
    } else if (phase === 'dawn') {
      // Sun just cresting the skyline, left side
      const sy = wy + wh * 0.76;
      const sg = ctx.createRadialGradient(wx + ww * 0.22, sy, 0, wx + ww * 0.22, sy, 90);
      sg.addColorStop(0, 'rgba(255,180,50,0.65)');
      sg.addColorStop(0.4, 'rgba(255,80,15,0.28)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg; ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = 'rgba(255,210,90,0.92)';
      ctx.beginPath(); ctx.arc(wx + ww * 0.22, sy, 13, 0, Math.PI * 2); ctx.fill();
    } else if (phase === 'day') {
      // Sun high in the blue sky
      const sg = ctx.createRadialGradient(wx + ww * 0.72, wy + 38, 0, wx + ww * 0.72, wy + 38, 60);
      sg.addColorStop(0, 'rgba(255,252,220,0.65)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg; ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = 'rgba(255,255,225,0.96)';
      ctx.beginPath(); ctx.arc(wx + ww * 0.72, wy + 38, 14, 0, Math.PI * 2); ctx.fill();
    } else { // dusk
      const sy = wy + wh * 0.70;
      const sg = ctx.createRadialGradient(wx + ww * 0.62, sy, 0, wx + ww * 0.62, sy, 110);
      sg.addColorStop(0, 'rgba(255,110,20,0.62)');
      sg.addColorStop(0.45, 'rgba(200,30,10,0.28)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg; ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = 'rgba(255,155,35,0.92)';
      ctx.beginPath(); ctx.arc(wx + ww * 0.62, sy, 17, 0, Math.PI * 2); ctx.fill();
    }

    // Clip drawing to glass pane
    ctx.save();
    ctx.beginPath();
    ctx.rect(wx, wy, ww, wh);
    ctx.clip();

    // Building silhouettes — darker/lighter by phase
    const bFar = phase === 'day' ? '#0e1a36' : '#06080e';
    const bMid = phase === 'day' ? '#121e3e' : '#080c14';

    const buildings = [
      {x:0,   w:38, h:0.48}, {x:42,  w:22, h:0.38}, {x:66,  w:28, h:0.56},
      {x:97,  w:18, h:0.32}, {x:118, w:40, h:0.46}, {x:161, w:22, h:0.60},
      {x:187, w:18, h:0.40}, {x:210, w:34, h:0.52}, {x:247, w:20, h:0.36},
      {x:272, w:44, h:0.64}, {x:320, w:22, h:0.44}, {x:346, w:28, h:0.50},
      {x:382, w:18, h:0.38}, {x:402, w:35, h:0.48}, {x:440, w:24, h:0.42},
    ];
    buildings.forEach(b => {
      const bh = Math.floor(wh * b.h);
      ctx.fillStyle = bFar;
      ctx.fillRect(wx + b.x, wy + wh - bh, b.w, bh);
    });

    const midBuildings = [
      {x:10,  w:32, h:0.72}, {x:55,  w:26, h:0.58}, {x:92,  w:20, h:0.68},
      {x:150, w:38, h:0.82}, {x:198, w:16, h:0.62}, {x:224, w:42, h:0.76},
      {x:275, w:24, h:0.70}, {x:308, w:18, h:0.55}, {x:338, w:32, h:0.78},
    ];
    midBuildings.forEach(b => {
      const bh = Math.floor(wh * b.h);
      ctx.fillStyle = bMid;
      ctx.fillRect(wx + b.x, wy + wh - bh, b.w, bh);
    });

    // Building windows — dim during day, bright at night
    const winBase = phase === 'day' ? 0.06 : 0.30;
    for (let i = 0; i < 90; i++) {
      const bx2 = wx + 4 + (i * 67 % (ww - 8));
      const by2 = wy + 30 + (i * 53 % (wh - 50));
      const alpha = winBase + (i % 5) * (phase === 'day' ? 0.02 : 0.10);
      const warm = i % 3 === 0;
      ctx.fillStyle = warm ? `rgba(255,230,150,${alpha})` : `rgba(180,210,255,${alpha})`;
      ctx.fillRect(bx2, by2, 2, 3);
    }

    // Clouds (day + dawn + dusk)
    if (phase !== 'night') {
      const cloudAlpha = phase === 'day' ? 0.18 : 0.10;
      ctx.fillStyle = phase === 'day' ? `rgba(180,210,255,${cloudAlpha})` : `rgba(255,160,100,${cloudAlpha})`;
      [[wx + 38, wy + 50, 52, 18], [wx + 148, wy + 33, 66, 20], [wx + 248, wy + 60, 50, 15]].forEach(([cx2, cy2, cw2, ch2]) => {
        ctx.beginPath(); ctx.ellipse(cx2, cy2, cw2, ch2, 0, 0, Math.PI * 2); ctx.fill();
      });
    }

    // Rain streaks (always — it's always raining up here)
    const rOffset = (frame * 4) % wh;
    ctx.strokeStyle = 'rgba(150,180,220,0.06)';
    ctx.lineWidth = 0.6;
    for (let i = 0; i < 18; i++) {
      const rx = wx + (i * 97 % ww);
      const ry = wy + ((rOffset + i * 43) % wh);
      ctx.beginPath();
      ctx.moveTo(rx - 1, ry);
      ctx.lineTo(rx + 1, ry + 14);
      ctx.stroke();
    }

    // Window pane dividers
    ctx.strokeStyle = 'rgba(30,30,48,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(wx + ww / 2, wy); ctx.lineTo(wx + ww / 2, wy + wh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx, wy + wh * 0.45); ctx.lineTo(wx + ww, wy + wh * 0.45); ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(40,40,60,0.7)';
    ctx.strokeRect(wx, wy, ww, wh);

    ctx.restore();

    // Window sill at bottom
    ctx.fillStyle = '#2a2830';
    ctx.fillRect(wx - 6, wy + wh, ww + 12, 8);

    if (hov) {
      ctx.strokeStyle = 'rgba(200,168,64,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(wx - 9, wy - 8, ww + 18, wh + 18);
    }
  }

  // ── WHITEBOARD (EASEL) ───────────────────────────────────────────────────────
  function drawWhiteboard() {
    const wx = 334, wy = 170, ww = 148, wh = 122;
    const hov = hoveredZone && hoveredZone.id === 'whiteboard';
    const floorY = 388;

    // ── Easel legs ──
    const legL_top  = [wx + 6,     wy + wh + 2];
    const legR_top  = [wx + ww - 6, wy + wh + 2];
    const legL_bot  = [wx - 18,     floorY];
    const legR_bot  = [wx + ww + 18, floorY];
    const legB_bot  = [wx + ww / 2,  floorY - 4];

    ctx.strokeStyle = '#2a1e10'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    // Front legs
    ctx.beginPath(); ctx.moveTo(...legL_top); ctx.lineTo(...legL_bot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...legR_top); ctx.lineTo(...legR_bot); ctx.stroke();
    // Back leg (center)
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(wx + ww / 2, wy + wh + 2); ctx.lineTo(...legB_bot); ctx.stroke();
    // Cross brace
    const brY = wy + wh + 50;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(wx - 6, brY); ctx.lineTo(wx + ww + 6, brY); ctx.stroke();
    ctx.lineCap = 'butt';

    // ── Board frame ──
    ctx.fillStyle = '#2a2010';
    rrect(wx - 5, wy - 5, ww + 10, wh + 10, 3);
    ctx.fill();
    // Marker tray
    ctx.fillStyle = '#1a1206';
    ctx.fillRect(wx - 3, wy + wh + 4, ww + 6, 8);
    ['#cc2222','#2244aa','#1a7a1a'].forEach((c, i) => {
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(wx + 10 + i * 10, wy + wh + 8, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
    });

    // ── Board surface ──
    ctx.fillStyle = '#ede9d6';
    rrect(wx, wy, ww, wh, 2);
    ctx.fill();

    // Grid lines
    ctx.strokeStyle = 'rgba(180,178,155,0.2)';
    ctx.lineWidth = 0.5;
    for (let x = wx + 18; x < wx + ww; x += 18) {
      ctx.beginPath(); ctx.moveTo(x, wy + 1); ctx.lineTo(x, wy + wh - 1); ctx.stroke();
    }
    for (let y = wy + 14; y < wy + wh; y += 14) {
      ctx.beginPath(); ctx.moveTo(wx + 1, y); ctx.lineTo(wx + ww - 1, y); ctx.stroke();
    }

    // Title
    ctx.fillStyle = '#8b0000';
    ctx.font = 'bold 7px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CITY TAKEOVER 2026', wx + ww / 2, wy + 11);
    ctx.textAlign = 'left';

    // Phase rows (compact)
    const phases = [
      { label:'PH1', color:'#1a7a1a', status:'✓ DONE', x:wx + 6,  y:wy + 18 },
      { label:'PH2', color:'#1a7a1a', status:'✓ DONE', x:wx + 6,  y:wy + 44 },
      { label:'PH3', color:'#cc6600', status:'⟳ NOW',  x:wx + 6,  y:wy + 70 },
      { label:'PH4', color:'#888',    status:'◻ TBD',  x:wx + 6,  y:wy + 96 },
    ];
    phases.forEach(p => {
      ctx.strokeStyle = p.color; ctx.lineWidth = 1;
      rrect(p.x, p.y, 64, 20, 2); ctx.stroke();
      ctx.fillStyle = p.color; ctx.font = 'bold 6px Arial';
      ctx.fillText(p.label, p.x + 4, p.y + 10);
      ctx.fillStyle = '#333'; ctx.font = '5.5px Arial';
      ctx.fillText(p.status, p.x + 4, p.y + 18);
    });

    // Margin notes (right side, cramped handwriting)
    ctx.fillStyle = '#2244aa';
    ctx.font = 'italic 5.5px Arial';
    ctx.fillText('need', wx + 80, wy + 30);
    ctx.fillText('enchanter!', wx + 78, wy + 38);
    ctx.fillStyle = '#8b0000';
    ctx.fillText('Q3 deadline', wx + 78, wy + 70);
    ctx.fillText('→ Lich???', wx + 80, wy + 80);

    if (hov) {
      ctx.strokeStyle = 'rgba(200,168,64,0.6)';
      ctx.lineWidth = 2;
      rrect(wx - 6, wy - 6, ww + 12, wh + 230, 4);
      ctx.stroke();
    }
  }

  function drawMonet() {
    const mx = 563, my = 106, mw = 140, mh = 114;

    ctx.beginPath(); ctx.ellipse(mx + 97, my + 80, 20, 8, -0.1, 0, Math.PI*2); ctx.fill();

    // Impressionist dabs (trees/sky)
    ctx.fillStyle = 'rgba(140,190,140,0.4)';

    ctx.fillStyle = 'rgba(100,160,120,0.35)';

    // Nameplate
    ctx.fillStyle = '#a88828';

    ctx.font = '6px serif'; ctx.textAlign = 'center';

    ctx.textAlign = 'left';

    if (hov) {
      ctx.strokeStyle = 'rgba(200,168,64,0.7)';

  function lightenColor(hex) {
    // Simple hex lightener for hover effect
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n >> 16) & 0xff) + 40);
    const g = Math.min(255, ((n >> 8)  & 0xff) + 40);
    const b2= Math.min(255, ( n        & 0xff) + 40);
    return `rgb(${r},${g},${b2})`;
  }

    ctx.moveTo(...D.FL); ctx.lineTo(...D.FR);
    ctx.lineTo(...D.BR); ctx.lineTo(...D.BL);

    facGrad.addColorStop(0, '#1e0e04');

    ctx.moveTo(...D.BL);
    ctx.lineTo(...D.FL);
    ctx.lineTo(D.FL[0], D.FL[1] + 66);

  // ── APOCALYPTIC ─────────────────────────────────────────────────────────────
  function drawApocalyptic() {
    const depthScale = getDepthScale(apocY);
    const BASE_H = Math.floor(BASE_W * (apocState === 'walk' ? SIDE.sh / SIDE.sw : FRONT.sh / FRONT.sw));
    const DRAW_W = Math.floor(BASE_W * depthScale);
    const DRAW_H = Math.floor(BASE_H * depthScale);
    const DRAW_X = Math.floor(apocX - DRAW_W / 2);
    const DRAW_Y = Math.floor(apocY - DRAW_H);

    // Shadow
    ctx.fillStyle = `rgba(0,0,0,${0.25 * depthScale})`;
    ctx.beginPath();
    ctx.ellipse(apocX, apocY + 4, 30 * depthScale, 8 * depthScale, 0, 0, Math.PI * 2);
    ctx.fill();

    // Subtle crimson aura when idle
    if (apocState === 'idle') {
      const aura = ctx.createRadialGradient(apocX, DRAW_Y + DRAW_H / 2, 0, apocX, DRAW_Y + DRAW_H / 2, 60 * depthScale);
      const pa = 0.04 + Math.sin(frame * 0.05) * 0.025;
      aura.addColorStop(0, `rgba(180,20,20,${pa})`);
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.ellipse(apocX, DRAW_Y + DRAW_H / 2, 60 * depthScale, 60 * depthScale, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    if (!spriteReady) {
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(DRAW_X, DRAW_Y, DRAW_W, DRAW_H);
      return;
    }

    const SPR = apocState === 'walk' ? SIDE : FRONT;

    // SIDE sprite faces LEFT by default — mirror when walking right
    if (apocDir === 1 && apocState === 'walk') {
      ctx.save();
      ctx.translate(DRAW_X + DRAW_W, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(apocImg, SPR.sx, SPR.sy, SPR.sw, SPR.sh, 0, DRAW_Y, DRAW_W, DRAW_H);
      ctx.restore();
    } else {
      ctx.drawImage(apocImg, SPR.sx, SPR.sy, SPR.sw, SPR.sh, DRAW_X, DRAW_Y, DRAW_W, DRAW_H);
    }
  }

  // ── SPEECH BUBBLE ────────────────────────────────────────────────────────────
  function drawSpeechBubble() {
    const depthScale = getDepthScale(apocY);
    const BASE_H = Math.floor(BASE_W * (apocState === 'walk' ? SIDE.sh / SIDE.sw : FRONT.sh / FRONT.sw));
    const DRAW_H = Math.floor(BASE_H * depthScale);
    const bubX = apocX;
    const bubY = apocY - DRAW_H - 14;
    const text = SPEECHES[speechIdx];
    if (!text) return;

    const font = '16px "Segoe UI", Arial, sans-serif';
    ctx.font = font;
    const maxW = 310, lineH = 22, padX = 16, padY = 12;
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    words.forEach(w => {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW - padX * 2) {
        if (cur) lines.push(cur);
        cur = w;
      } else { cur = test; }
    });
    if (cur) lines.push(cur);

    const bw = Math.min(maxW, Math.max(...lines.map(l => ctx.measureText(l).width)) + padX * 2);
    const bh = lines.length * lineH + padY * 2;
    const bx = Math.max(8, Math.min(W - bw - 8, bubX - bw / 2));
    const by = Math.max(8, bubY - bh - 10);

    // Bubble fill
    ctx.fillStyle = 'rgba(12,10,20,0.93)';
    rrect(bx, by, bw, bh, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,20,20,0.7)';
    ctx.lineWidth = 1.5;
    rrect(bx, by, bw, bh, 10);
    ctx.stroke();

    // Tail
    const tailX = Math.max(bx + 16, Math.min(bx + bw - 16, bubX));
    ctx.fillStyle = 'rgba(12,10,20,0.93)';
    ctx.beginPath();
    ctx.moveTo(tailX - 7, by + bh);
    ctx.lineTo(tailX + 7, by + bh);
    ctx.lineTo(bubX, by + bh + 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,20,20,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tailX - 7, by + bh);
    ctx.lineTo(bubX, by + bh + 10);
    ctx.moveTo(tailX + 7, by + bh);
    ctx.lineTo(bubX, by + bh + 10);
    ctx.stroke();

    // Text
    ctx.font = font;
    ctx.fillStyle = '#e8e0d0';
    lines.forEach((l, i) => {
      ctx.fillText(l, bx + padX, by + padY + i * lineH + 13);
    });
  }

    if (!hoveredZone) return;
    const z = hoveredZone;
    const lx = z.x + z.w / 2, ly = z.y - 8;
    const label = z.label;
    ctx.font = '12px "Segoe UI", Arial';
    const tw = ctx.measureText(label).width;
    const px2 = 8, py2 = 5;
    const bx2 = Math.max(4, Math.min(W - tw - px2 * 2 - 4, lx - (tw + px2 * 2) / 2));
    const by2 = Math.max(4, ly - 24);
    ctx.fillStyle = 'rgba(12,10,20,0.88)';
    rrect(bx2, by2, tw + px2 * 2, 22, 5);
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,20,20,0.5)';
    ctx.lineWidth = 1;
    rrect(bx2, by2, tw + px2 * 2, 22, 5);
    ctx.stroke();
    ctx.fillStyle = '#e8e0d0';
    ctx.fillText(label, bx2 + px2, by2 + 15);
  }

  // ── MAIN LOOP ────────────────────────────────────────────────────────────────
  function update() {
    // Character movement
    if (apocState === 'walk') {
      apocX += apocDir * WALK_SPEED;
      if (apocX >= WALK_MAX || apocX <= WALK_MIN) {
        apocX = Math.max(WALK_MIN, Math.min(WALK_MAX, apocX));
        apocState = 'idle';
        apocStateT = 0;
      }
    } else {
      apocStateT++;
      if (apocStateT >= IDLE_PAUSE) {
        apocDir = apocX <= WALK_MIN + 10 ? 1 : -1;
        apocState = 'walk';
      }
    }

    // Speech bubble cycling
    speechTimer++;
    if (speechTimer >= SPEECH_INTERVAL) {
      speechTimer = 0;
      speechDeckPos++;
      if (speechDeckPos >= speechDeck.length) {
        speechDeck = shuffleDeck();
        speechDeckPos = 0;
      }
      speechIdx = speechDeck[speechDeckPos];
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawRoom();
    // Back wall art (drawn before character)
    drawWindow();
    drawPoster();
    drawGuitar();
    drawMonet();
    // Floor objects (back to front)
    drawBookshelf();
    drawWhiteboard();
    drawFilingCabinet();  // back-right corner, behind desk
    drawDesk();
    drawTPSReports();
    drawComputer();
    // Character + UI
    drawApocalyptic();
    drawSpeechBubble();
    drawZoneLabel();
  }

  function loop() {
    update();
    draw();
    frame++;
    requestAnimationFrame(loop);
  }
  loop();

  // ── INPUT ────────────────────────────────────────────────────────────────────
  canvas.addEventListener('mousemove', e => {
    const { lx, ly } = toLogical(e.clientX, e.clientY);
    hoveredZone = zoneAt(lx, ly);
    canvas.style.cursor = hoveredZone ? 'pointer' : 'default';
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredZone = null;
    canvas.style.cursor = 'default';
  });

  canvas.addEventListener('click', e => {
    const { lx, ly } = toLogical(e.clientX, e.clientY);
    const z = zoneAt(lx, ly);
    if (z) openModal(z.id);
  });
</script>
</body>
</html>
